<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featured Artists — Audiotool</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Geist+Mono&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; background:#0e0e0e; }

  #frame {
    position:fixed;
    top:0; left:0; right:0;
    bottom:72px;
    border:none;
    width:100%;
    height:calc(100% - 72px);
  }

  #global-player {
    position:fixed;
    bottom:0; left:0; right:0;
    height:72px;
    background:#111111;
    border-top:2px solid #222;
    display:flex;
    align-items:center;
    gap:16px;
    padding:0 24px;
    z-index:1000;
    transition:border-color .6s ease, background .6s ease;
  }

  .gp-cover {
    width:44px; height:44px;
    object-fit:cover;
    border:1px solid #222;
    flex-shrink:0;
    background:#1a1a1a;
  }

  .gp-info {
    display:flex;
    flex-direction:column;
    gap:3px;
    min-width:0;
    flex:1;
    max-width:240px;
  }
  .gp-track {
    font-family:"Bebas Neue", Impact, sans-serif;
    font-size:15px;
    letter-spacing:.08em;
    color:#fff;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .gp-at-link {
    font-family:"Geist Mono", monospace;
    font-size:10px;
    letter-spacing:.06em;
    text-decoration:none;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    transition:opacity .15s;
    opacity:.8;
  }
  .gp-at-link:hover { opacity:1; text-decoration:underline; }

  .gp-artist {
    font-family:"Geist Mono", monospace;
    font-size:10px;
    color:#aaa;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    letter-spacing:.04em;
  }

  .gp-controls {
    display:flex;
    align-items:center;
    gap:10px;
    flex-shrink:0;
  }
  .gp-btn {
    background:none;
    border:1px solid #444;
    color:#e8c840;
    font-family:"Bebas Neue", Impact, sans-serif;
    font-size:13px;
    letter-spacing:.1em;
    padding:5px 14px;
    cursor:pointer;
    transition:background .15s, color .15s, border-color .15s;
    white-space:nowrap;
  }
  .gp-btn:hover { color:#0e0e0e; }
  .gp-btn.primary {
    font-size:18px;
    padding:6px 20px;
    border-width:2px;
  }

  .gp-audio-wrap {
    flex:1;
    min-width:0;
    max-width:440px;
  }
  .gp-audio-wrap audio {
    width:100%;
    height:32px;
    display:block;
  }

  .gp-counter {
    font-family:"Bebas Neue", Impact, sans-serif;
    font-size:13px;
    letter-spacing:.1em;
    color:#666;
    flex-shrink:0;
    min-width:52px;
    text-align:center;
  }

  .gp-idle {
    font-family:"Bebas Neue", Impact, sans-serif;
    font-size:13px;
    letter-spacing:.15em;
    color:#444;
  }

  @media(max-width:700px){
    .gp-audio-wrap { display:none; }
    .gp-info { max-width:160px; }
  }
</style>
</head>
<body>

<iframe id="frame" src="index.html"></iframe>

<div id="global-player">
  <img class="gp-cover" id="gpCover" src="" alt="" style="display:none">
  <div class="gp-info" id="gpInfo" style="display:none">
    <div class="gp-track" id="gpTrack"></div>
    <a class="gp-at-link" id="gpAtLink" href="#" target="_blank">LISTEN ON AUDIOTOOL ↗</a>
  </div>
  <div class="gp-idle" id="gpIdle">NO TRACK LOADED</div>
  <div class="gp-controls">
    <button class="gp-btn" id="gpPrevBtn" onclick="gpPrev()" style="display:none">PREV</button>
    <button class="gp-btn primary" id="gpPlayBtn" onclick="gpTogglePlay()">▶</button>
    <button class="gp-btn" id="gpNextBtn" onclick="gpNext()" style="display:none">NEXT</button>
    <span class="gp-counter" id="gpCounter"></span>
  </div>
  <div class="gp-audio-wrap">
    <audio id="gpAudio" preload="none"></audio>
  </div>
</div>

<script>
let gpTracks = [];
let gpIdx = -1;
let gpLoaded = false;
let gpColor = '#e8c840';
let gpLinkColor = '#888888';

const gpAudio    = document.getElementById('gpAudio');
const gpCoverEl  = document.getElementById('gpCover');
const gpTrackEl  = document.getElementById('gpTrack');
const gpAtLink   = document.getElementById('gpAtLink');
const gpInfo     = document.getElementById('gpInfo');
const gpIdle     = document.getElementById('gpIdle');
const gpPlayBtn  = document.getElementById('gpPlayBtn');
const gpPrevBtn  = document.getElementById('gpPrevBtn');
const gpNextBtn  = document.getElementById('gpNextBtn');
const gpCounter  = document.getElementById('gpCounter');
const gpPlayer   = document.getElementById('global-player');

function tIdFromUrl(url){
  const m = (url||'').match(/\/track\/([^/]+)/);
  return m ? m[1].replace(/\/$/,'') : '';
}

function applyColor(color){
  if(!color) return;
  gpColor = color;
  gpPlayer.style.borderTopColor = color;
  gpPlayBtn.style.color = color;
  gpPlayBtn.style.borderColor = color;
  gpPrevBtn.style.color = color;
  gpPrevBtn.style.borderColor = color;
  gpNextBtn.style.color = color;
  gpNextBtn.style.borderColor = color;
  gpCounter.style.color = color;
  gpPlayBtn.onmouseover = () => { gpPlayBtn.style.background = color; gpPlayBtn.style.color = '#0e0e0e'; };
  gpPlayBtn.onmouseout  = () => { gpPlayBtn.style.background = 'none'; gpPlayBtn.style.color = color; };
  gpPrevBtn.onmouseover = () => { gpPrevBtn.style.background = color; gpPrevBtn.style.color = '#0e0e0e'; };
  gpPrevBtn.onmouseout  = () => { gpPrevBtn.style.background = 'none'; gpPrevBtn.style.color = color; };
  gpNextBtn.onmouseover = () => { gpNextBtn.style.background = color; gpNextBtn.style.color = '#0e0e0e'; };
  gpNextBtn.onmouseout  = () => { gpNextBtn.style.background = 'none'; gpNextBtn.style.color = color; };
}

function applyLinkColor(color){
  gpLinkColor = color || '#888888';
  gpAtLink.style.color = gpLinkColor;
}

function gpShowTrack(idx){
  if(!gpTracks.length) return;
  const t = gpTracks[idx];
  const trackId = tIdFromUrl(t.url);
  if(!trackId) return;
  gpCoverEl.src = `https://api.audiotool.com/track/${trackId}/cover/256.jpg`;
  gpCoverEl.style.display = 'block';
  gpTrackEl.textContent = (t.track_artist ? t.track_artist + ' . ' : '') + (t.name || trackId);
  gpAtLink.href = `https://www.audiotool.com/track/${trackId}/`;
  gpAtLink.style.color = gpLinkColor;
  gpInfo.style.display = 'flex';
  gpIdle.style.display = 'none';
  gpPrevBtn.style.display = 'inline-block';
  gpNextBtn.style.display = 'inline-block';
  gpCounter.textContent = (idx + 1) + ' / ' + gpTracks.length;
}

function gpLoad(idx, autoplay){
  if(!gpTracks.length) return;
  if(idx < 0) idx = gpTracks.length - 1;
  if(idx >= gpTracks.length) idx = 0;
  gpIdx = idx;
  gpLoaded = true;

  const t = gpTracks[idx];
  const trackId = tIdFromUrl(t.url);
  if(!trackId) return;

  gpShowTrack(idx);
  gpAudio.src = `https://api.audiotool.com/track/${trackId}/play.mp3`;

  if(autoplay){
    gpAudio.play().catch(()=>{});
    gpPlayBtn.textContent = '■';
  } else {
    gpPlayBtn.textContent = '▶';
  }
}

function gpTogglePlay(){
  if(!gpLoaded){
    if(gpTracks.length){ gpLoad(0, true); }
    return;
  }
  if(gpAudio.paused){
    gpAudio.play().catch(()=>{});
    gpPlayBtn.textContent = '■';
  } else {
    gpAudio.pause();
    gpPlayBtn.textContent = '▶';
  }
}

function gpPrev(){ gpLoad(gpIdx - 1, !gpAudio.paused); }
function gpNext(){ gpLoad(gpIdx + 1, !gpAudio.paused); }

gpAudio.addEventListener('ended', () => gpLoad(gpIdx + 1, true));
gpAudio.addEventListener('play',  () => { gpPlayBtn.textContent = '■'; });
gpAudio.addEventListener('pause', () => { gpPlayBtn.textContent = '▶'; });

window.addEventListener('message', function(e){
  const d = e.data;
  if(!d || !d.type) return;

  if(d.type === 'GP_PRELOAD'){
    gpTracks = d.tracks || [];
    gpIdx = -1;
    gpLoaded = false;
    if(gpTracks.length){
      gpShowTrack(0);
      gpCounter.textContent = '1 / ' + gpTracks.length;
      gpPlayBtn.textContent = '▶';
    }
    if(d.color) applyColor(d.color);
    applyLinkColor(d.links_bar_color || null);
  }

  if(d.type === 'GP_LOAD_TRACKS'){
    gpTracks = d.tracks || [];
    if(!gpAudio.paused){
      // music playing - just update track list silently
    } else {
      gpIdx = -1;
      gpLoaded = false;
      if(gpTracks.length){
        gpShowTrack(0);
        gpCounter.textContent = '- / ' + gpTracks.length;
        gpPlayBtn.textContent = '▶';
        gpAudio.src = '';
      }
    }
    if(d.color) applyColor(d.color);
    applyLinkColor(d.links_bar_color || null);
  }

  if(d.type === 'GP_PLAY_TRACK'){
    if(d.tracks) gpTracks = d.tracks;
    if(d.color) applyColor(d.color);
    applyLinkColor(d.links_bar_color || null);
    gpLoad(d.idx, true);
  }

  if(d.type === 'NAVIGATE'){
    document.getElementById('frame').src = d.url;
  }
});
</script>
</body>
</html>
