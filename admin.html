<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — AT Featured Artists</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0a0a0a;--surface:#141414;--surface2:#1c1c1c;--border:#2a2a2a;--text:#e8e4dc;--muted:#888;--dim:#444;--accent:#e8c840;--green:#4ade80;--red:#f87171;--block:'Bebas Neue',Impact,sans-serif;--mono:'DM Mono',monospace; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;min-height:100vh;}
  #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;}
  .login-title{font-family:var(--block);font-size:32px;letter-spacing:.15em;color:var(--accent);}
  .login-sub{color:var(--muted);font-size:11px;letter-spacing:.1em;}
  .login-box{display:flex;gap:0;border:2px solid var(--border);}
  .login-box input{background:var(--surface);border:none;outline:none;color:var(--text);font-family:var(--mono);font-size:13px;padding:12px 16px;width:260px;letter-spacing:.05em;}
  .login-box button{background:var(--accent);border:none;color:var(--bg);font-family:var(--block);font-size:16px;letter-spacing:.1em;padding:12px 20px;cursor:pointer;}
  .login-err{color:var(--red);font-size:11px;letter-spacing:.08em;display:none;}
  #mainScreen{display:none;}
  header{border-bottom:2px solid var(--border);padding:0 32px;height:50px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,10,10,.95);position:sticky;top:0;z-index:100;}
  .hlogo{font-family:var(--block);font-size:18px;letter-spacing:.15em;color:var(--accent);}
  .hright{display:flex;align-items:center;gap:16px;}
  .save-all-btn{background:var(--accent);color:var(--bg);font-family:var(--block);font-size:14px;letter-spacing:.1em;padding:8px 20px;border:none;cursor:pointer;display:flex;align-items:center;gap:8px;}
  .save-all-btn:disabled{opacity:.4;cursor:not-allowed;}
  .status-msg{font-size:11px;color:var(--muted);letter-spacing:.08em;}
  .layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 50px);}
  .sidebar{border-right:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 50px);position:sticky;top:50px;}
  .search-box{padding:12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10;}
  .search-box input{width:100%;background:var(--surface);border:1px solid var(--border);outline:none;color:var(--text);font-family:var(--mono);font-size:12px;padding:8px 12px;}
  .artist-item{padding:10px 16px;cursor:pointer;transition:background .1s;display:flex;align-items:center;justify-content:space-between;gap:8px;}
  .artist-item:hover{background:var(--surface);}
  .artist-item.active{background:var(--surface2);border-left:3px solid var(--accent);}
  .ai-name{font-family:var(--block);font-size:14px;letter-spacing:.06em;}
  .ai-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--dim);border:1px solid var(--border);}
  .ai-dot.has-colors{background:var(--green);border-color:var(--green);}
  .editor{padding:40px;max-width:960px;overflow-y:auto;max-height:calc(100vh - 50px);}
  .ed-title{font-family:var(--block);font-size:36px;letter-spacing:.1em;margin-bottom:4px;}
  .ed-sub{color:var(--muted);font-size:11px;letter-spacing:.1em;margin-bottom:32px;}
  .ed-section{margin-bottom:36px;}
  .ed-section-title{font-family:var(--block);font-size:16px;letter-spacing:.12em;color:var(--accent);margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--border);text-transform:uppercase;}
  .field-row{display:flex;flex-direction:column;gap:4px;margin-bottom:14px;}
  .field-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}
  .field-input{background:var(--surface);border:1px solid var(--border);outline:none;color:var(--text);font-family:var(--mono);font-size:12px;padding:8px 12px;width:100%;transition:border-color .15s;}
  .field-input:focus{border-color:var(--accent);}
  textarea.field-input{resize:vertical;min-height:80px;line-height:1.6;}
  .fields-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .track-card{background:var(--surface);border:1px solid var(--border);padding:16px;margin-bottom:12px;}
  .track-card-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .track-num{font-family:var(--block);font-size:18px;color:var(--accent);min-width:24px;}
  .track-cover-preview{width:40px;height:40px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;}
  .track-info{flex:1;min-width:0;}
  .track-name-display{font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .track-artist-display{font-size:10px;color:var(--muted);}
  .track-url-row{display:flex;gap:8px;margin-bottom:10px;}
  .track-url-row .field-input{flex:1;}
  .track-lookup-btn{background:var(--surface2);border:1px solid var(--border);color:var(--accent);font-family:var(--block);font-size:12px;letter-spacing:.1em;padding:6px 14px;cursor:pointer;white-space:nowrap;}
  .track-lookup-btn:hover{background:var(--border);}
  .track-lookup-btn:disabled{opacity:.4;cursor:not-allowed;}
  .color-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px;max-width:720px;}
  .color-field label{display:block;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .color-picker-row{display:flex;align-items:center;border:1px solid var(--border);}
  .color-picker-row input[type=color]{width:40px;height:36px;border:none;padding:2px;background:var(--surface);cursor:pointer;flex-shrink:0;}
  .color-picker-row input[type=text]{flex:1;background:var(--surface);border:none;border-left:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:0 10px;height:36px;outline:none;}
  .preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
  .preview-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .preview-img{width:100%;aspect-ratio:1;object-fit:cover;display:block;border:1px solid var(--border);background:var(--surface);cursor:crosshair;}
  .preview-img-wrap{position:relative;}
  .preview-img-wrap canvas{display:none;}
  .color-preview{height:56px;border:1px solid var(--border);margin-bottom:20px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .color-preview-bg{position:absolute;inset:0;}
  .color-preview-text{position:relative;font-family:var(--block);font-size:20px;letter-spacing:.15em;}
  .save-btn{background:var(--accent);color:var(--bg);font-family:var(--block);font-size:16px;letter-spacing:.12em;padding:10px 28px;border:none;cursor:pointer;}
  .save-status{margin-left:14px;font-size:11px;color:var(--muted);}
  .empty{color:var(--dim);font-size:13px;padding:40px;}
  #toast{position:fixed;bottom:24px;right:24px;padding:12px 24px;font-family:var(--block);font-size:16px;letter-spacing:.1em;background:var(--green);color:#000;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;}
  #toast.show{opacity:1;}
  #toast.error{background:var(--red);}
  .qa-item{background:var(--surface2);border:1px solid var(--border);padding:12px;margin-bottom:8px;}
  .qa-remove{float:right;background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:0 4px;}
  .add-btn{background:none;border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:11px;padding:6px 14px;cursor:pointer;margin-top:8px;}
  .add-btn:hover{border-color:var(--accent);color:var(--accent);}
</style>
</head>
<body>
<div id="loginScreen">
  <div class="login-title">AT // ADMIN</div>
  <div class="login-sub">FEATURED ARTISTS CONTROL PANEL</div>
  <div style="display:flex;flex-direction:column;gap:12px">
    <div class="login-box"><input type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="login-box">
      <input type="password" id="tokenInput" placeholder="GitHub Token" onkeydown="if(event.key==='Enter')doLogin()">
      <button onclick="doLogin()">ENTER</button>
    </div>
  </div>
  <div class="login-err" id="loginErr">WRONG PASSWORD</div>
</div>
<div id="mainScreen">
  <header>
    <div class="hlogo">AT // ADMIN</div>
    <div class="hright">
      <span class="status-msg" id="statusMsg"></span>
      <a id="previewLink" href="#" target="_blank" style="font-family:var(--block);font-size:13px;letter-spacing:.1em;color:var(--muted);text-decoration:none;display:none;">↗ PREVIEW</a>
      <button class="save-all-btn" id="saveAllBtn" onclick="saveAll()" disabled><span>⬆</span> PUSH TO GITHUB</button>
    </div>
  </header>
  <div class="layout">
    <div class="sidebar">
      <div style="padding:12px;border-bottom:1px solid var(--border);">
        <button onclick="newArtist()" style="width:100%;background:none;border:1px solid var(--accent);color:var(--accent);font-family:var(--block);font-size:14px;letter-spacing:.12em;padding:8px;cursor:pointer;">+ NEW ARTIST</button>
      </div>
      <div class="search-box"><input type="text" id="searchInput" placeholder="Search artists..." oninput="filterArtists()"></div>
      <div id="artistList"></div>
    </div>
    <div class="editor" id="editor"><div class="empty">← Select an artist to edit</div></div>
  </div>
</div>
<div id="toast"></div>
<script>
const GITHUB_REPO='SnadBreugen/AT-featured-artists',DATA_PATH='data.json',PASSWORD='audiotool2026';
let GITHUB_TOKEN='',data=[],currentIdx=null,dirty=false,fileSha='',lastPickedColor=null;

function doLogin(){
  const pw=document.getElementById('pwInput').value,tok=document.getElementById('tokenInput').value.trim();
  if(pw===PASSWORD&&tok){GITHUB_TOKEN=tok;document.getElementById('loginScreen').style.display='none';document.getElementById('mainScreen').style.display='block';loadData();}
  else{const e=document.getElementById('loginErr');e.style.display='block';e.textContent=!tok?'ENTER GITHUB TOKEN':'WRONG PASSWORD';}
}
function deleteArtist(){
  if(currentIdx===null) return;
  const name = data[currentIdx].artist;
  if(!confirm('Delete "' + name + '"? This cannot be undone.')) return;
  data.splice(currentIdx, 1);
  currentIdx = null;
  document.getElementById('editor').innerHTML = '<div class="empty">Artist deleted — click PUSH TO GITHUB to save</div>';
  filterArtists();
  markDirty();
  showToast('Deleted: ' + name);
}
function toggleHidden(){
  if(currentIdx===null) return;
  data[currentIdx].is_hidden = !data[currentIdx].is_hidden;
  markDirty();
  selectArtist(currentIdx);
  showToast(data[currentIdx].is_hidden ? 'Artist hidden' : 'Artist visible');
}
function toggleCurrent(){
  if(currentIdx===null) return;
  const isCurrent = !data[currentIdx].is_current;
  // Remove from all others first
  data.forEach((a,i) => { if(i!==currentIdx) a.is_current=false; });
  data[currentIdx].is_current = isCurrent;
  markDirty();
  // Re-render to update button
  selectArtist(currentIdx);
  showToast(isCurrent ? 'Set as Current Featured!' : 'Removed from Current');
}
function newArtist(){
  const a={
    artist:'NEW ARTIST',real_name:'',date:new Date().toISOString().slice(0,10),
    board_url:'',album_url:'',at_profile:'',soundcloud:'',photo:'',cover_url:'',
    intro:'',about:'',interview:[],tracks:[],social:{},color1:'',color2:'',color_accent:'',desc_bg:''
  };
  data.push(a);
  currentIdx=data.length-1;
  renderList(data);
  selectArtist(currentIdx);
  markDirty();
  showToast('New artist created!');
}
function setStatus(m){document.getElementById('statusMsg').textContent=m;}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

async function loadData(){
  setStatus('Loading...');
  try{
    const r=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${DATA_PATH}`,{headers:{Authorization:`token ${GITHUB_TOKEN}`,Accept:'application/vnd.github.v3+json'}});
    const j=await r.json();fileSha=j.sha;data=JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\n/g,'')))));
    renderList(data);setStatus(`${data.length} artists loaded`);
  }catch(e){setStatus('Error loading data');}
}

function renderList(artists){
  document.getElementById('artistList').innerHTML=artists.map(a=>{
    const isCur=!!a.is_current;
    const i=data.indexOf(a),hasColors=!!(a.color1&&a.color2);
    return `<div class="artist-item ${currentIdx===i?'active':''}" onclick="selectArtist(${i})"><span class="ai-name">${isCur?'★ ':''}${a.is_hidden?'◉ ':''} ${a.artist}</span><span class="ai-dot ${hasColors?'has-colors':''}" title="${hasColors?'Colors set':'No colors'}"></span></div>`;
  }).join('');
}
function filterArtists(){const q=document.getElementById('searchInput').value.toLowerCase();renderList(q?data.filter(a=>a.artist.toLowerCase().includes(q)):data);}

function selectArtist(idx){
  currentIdx=idx;filterArtists();
  const slug=encodeURIComponent(data[idx].artist);
  const pl=document.getElementById('previewLink');
  if(pl){pl.href=`artist.html?id=${slug}`;pl.style.display='block';}
  const a=data[idx];
  const albumId=(a.album_url||'').match(/\/album\/([^/]+)/)?.[1];
  const coverUrl=a.cover_url||(albumId?`https://api.audiotool.com/album/${albumId}/cover/256.jpg`:'');
  const c1=a.color1||'#333333',c2=a.color2||'#333333',ca=a.color_accent||c1;
  const social=a.social||{};
  const tracks=[...(a.tracks||[])];while(tracks.length<11)tracks.push({url:'',name:'',track_artist:'',desc:''});
  const isCurrent=!!a.is_current;
  const isHidden=!!a.is_hidden;

  document.getElementById('editor').innerHTML=`
    <div class="ed-title">${a.artist}</div>
    <div class="ed-sub">${a.real_name||''} &nbsp;·&nbsp; ${a.date||''}</div>
    <div style="margin-bottom:28px">
      <button onclick="toggleCurrent()" id="currentBtn" style="font-family:var(--block);font-size:13px;letter-spacing:.1em;padding:8px 20px;border:none;cursor:pointer;${isCurrent?'background:var(--accent);color:var(--bg)':'background:var(--surface);border:1px solid var(--border);color:var(--text-dim)'}">
        ${isCurrent ? '★ CURRENT FEATURED' : '☆ SET AS CURRENT FEATURED'}
      </button>
      <button onclick="toggleHidden()" id="hiddenBtn" style="font-family:var(--block);font-size:13px;letter-spacing:.1em;padding:8px 20px;border:none;cursor:pointer;margin-left:8px;${isHidden?'background:var(--red);color:#fff':'background:var(--surface);border:1px solid var(--border);color:var(--text-dim)'}">
        ${isHidden ? '◉ HIDDEN' : '○ SET AS HIDDEN'}
      </button>
    </div>

    <div class="ed-section">
      <div class="ed-section-title">Basic Info</div>
      <div class="fields-2col">
        <div class="field-row"><div class="field-label">Artist Name</div><input class="field-input" value="${esc(a.artist)}" onchange="save('artist',this.value)"></div>
        <div class="field-row"><div class="field-label">Real Name</div><input class="field-input" value="${esc(a.real_name||'')}" onchange="save('real_name',this.value)"></div>
        <div class="field-row"><div class="field-label">Date (YYYY-MM-DD)</div><input class="field-input" value="${esc(a.date||'')}" onchange="save('date',this.value)"></div>
        <div class="field-row"><div class="field-label">Album Number</div><input class="field-input" type="number" value="${a.album_number||''}" onchange="save('album_number',this.value?parseInt(this.value):null)" placeholder="e.g. 124"></div>
        <div class="field-row"><div class="field-label">Artist Photo URL</div><input class="field-input" value="${esc(a.photo||'')}" onchange="save('photo',this.value)"></div>
        <div class="field-row"><div class="field-label">Photo Position (e.g. top, center, 50% 20%)</div>
          <div style="display:flex;gap:8px">
            <input class="field-input" style="flex:1" value="${esc(a.photo_position||'top')}" onchange="save('photo_position',this.value)" placeholder="top">
            <button onclick="save('photo_position','top');this.previousElementSibling.value='top'" style="background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:10px;padding:0 10px;cursor:pointer;">top</button>
            <button onclick="save('photo_position','center');this.previousElementSibling.previousElementSibling.value='center'" style="background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:10px;padding:0 10px;cursor:pointer;">center</button>
            <button onclick="save('photo_position','bottom');this.previousElementSibling.previousElementSibling.previousElementSibling.value='bottom'" style="background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:10px;padding:0 10px;cursor:pointer;">bottom</button>
          </div>
        </div>
        <div class="field-row"><div class="field-label">Audiotool Profile URL</div><input class="field-input" value="${esc(a.at_profile||'')}" onchange="save('at_profile',this.value)"></div>
        <div class="field-row"><div class="field-label">Album URL</div><input class="field-input" value="${esc(a.album_url||'')}" onchange="save('album_url',this.value)"></div>
        <div class="field-row"><div class="field-label">Cover URL (override)</div><input class="field-input" value="${esc(a.cover_url||'')}" onchange="save('cover_url',this.value)"></div>
        <div class="field-row"><div class="field-label">Board Post URL</div><input class="field-input" value="${esc(a.board_url||'')}" onchange="save('board_url',this.value)"></div>
      </div>
    </div>

    <div class="ed-section">
      <div class="ed-section-title">Texts</div>
      <div class="field-row"><div class="field-label">Intro (editor's text)</div><textarea class="field-input" style="min-height:100px" onchange="save('intro',this.value)">${esc(a.intro||'')}</textarea></div>
      <div class="field-row"><div class="field-label">About (artist's own text)</div><textarea class="field-input" style="min-height:80px" onchange="save('about',this.value)">${esc(a.about||'')}</textarea></div>
    </div>

    <div class="ed-section">
      <div class="ed-section-title">Interview Q&As</div>
      <div id="qaList">${renderQAs(a.interview||[])}</div>
      <button class="add-btn" onclick="addQA()">+ ADD Q&A</button>
    </div>

    <div class="ed-section">
      <div class="ed-section-title">Social Links</div>
      <div class="fields-2col">
        <div class="field-row"><div class="field-label">SoundCloud</div><input class="field-input" value="${esc(a.soundcloud||social.soundcloud||'')}" onchange="saveSocial('soundcloud',this.value,true)"></div>
        <div class="field-row"><div class="field-label">Spotify</div><input class="field-input" value="${esc(social.spotify||'')}" onchange="saveSocial('spotify',this.value)"></div>
        <div class="field-row"><div class="field-label">Instagram</div><input class="field-input" value="${esc(social.instagram||'')}" onchange="saveSocial('instagram',this.value)"></div>
        <div class="field-row"><div class="field-label">Linktree</div><input class="field-input" value="${esc(social.linktree||'')}" onchange="saveSocial('linktree',this.value)"></div>
        <div class="field-row"><div class="field-label">Bandcamp</div><input class="field-input" value="${esc(social.bandcamp||'')}" onchange="saveSocial('bandcamp',this.value)"></div>
        <div class="field-row"><div class="field-label">Twitter / X</div><input class="field-input" value="${esc(social.twitter||'')}" onchange="saveSocial('twitter',this.value)"></div>
        <div class="field-row"><div class="field-label">YouTube</div><input class="field-input" value="${esc(social.youtube||'')}" onchange="saveSocial('youtube',this.value)"></div>
      </div>
    </div>

    <div class="ed-section">
      <div class="ed-section-title">Curated Tracks (max. 11)</div>
      <div id="trackList">${renderTracks(tracks)}</div>
    </div>

    <div class="ed-section">
      <div class="ed-section-title">Color Preview</div>
      <div class="color-preview"><div class="color-preview-bg" id="previewBg"></div><div class="color-preview-text" id="previewText">${a.artist.toUpperCase()}</div></div>
    </div>

    <div class="ed-section">
      <div class="ed-section-title">Images — Click to pick color</div>
      <div class="preview-grid">
        ${coverUrl?`<div><div class="preview-label">Album Cover</div><div class="preview-img-wrap"><img src="${coverUrl}" class="preview-img" id="coverImg" onclick="pickFromImage(event,'coverImg')" onerror="this.style.opacity='.3'"><canvas id="coverCanvas"></canvas></div><div style="font-size:10px;color:var(--dim);margin-top:4px">Click to pick color</div></div>`:`<div></div>`}
        ${a.photo?`<div><div class="preview-label">Artist Photo</div><div class="preview-img-wrap"><img src="${a.photo}" class="preview-img" id="photoImg" onclick="pickFromImage(event,'photoImg')" onerror="this.style.opacity='.3'"><canvas id="photoCanvas"></canvas></div><div style="font-size:10px;color:var(--dim);margin-top:4px">Click to pick color</div></div>`:''}
      </div>
      <div style="font-size:11px;color:var(--dim);margin-bottom:16px">
        Last picked: <span id="pickedColor" style="font-family:var(--mono)">—</span> &nbsp;
        <button onclick="assignColorBoth()" style="background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:10px;padding:4px 10px;cursor:pointer;">→ BACKGROUND + HEADLINES</button>
      </div>
    </div>

    <div class="ed-section">
      <div class="ed-section-title">Colors</div>
      <div class="color-grid">
        <div class="color-field"><label>Background + Headlines</label><div class="color-picker-row"><input type="color" id="color1Picker" value="${c1}" oninput="syncColor('color1',this.value);syncColor('color_accent',this.value)"><input type="text" id="color1Text" value="${c1}" oninput="syncColorText('color1',this.value)" maxlength="7"></div></div>
        <div class="color-field"><label>Track Desc Background</label><div class="color-picker-row"><input type="color" id="desc_bgPicker" value="${a.desc_bg||'#e8e4dc'}" oninput="syncColor('desc_bg',this.value)"><input type="text" id="desc_bgText" value="${a.desc_bg||'#e8e4dc'}" oninput="syncColorText('desc_bg',this.value)" maxlength="7"></div></div>
        <div class="color-field"><label>Links Bar Color</label><div class="color-picker-row"><input type="color" id="links_bar_colorPicker" value="${a.links_bar_color||'#888888'}" oninput="syncColor('links_bar_color',this.value)"><input type="text" id="links_bar_colorText" value="${a.links_bar_color||'#888888'}" oninput="syncColorText('links_bar_color',this.value)" maxlength="7"></div></div>
      </div>
    </div>

    <div style="padding-bottom:60px">
      <button class="save-btn" onclick="saveArtist()">SAVE ARTIST</button>
      <button onclick="deleteArtist()" style="background:none;border:1px solid var(--red);color:var(--red);font-family:var(--block);font-size:14px;letter-spacing:.1em;padding:10px 20px;cursor:pointer;margin-left:12px;">DELETE ARTIST</button>
      <span class="save-status" id="saveStatus"></span>
    </div>
  `;
  updatePreview(c1,c2,ca);
}

function renderQAs(qas){
  return qas.map((qa,i)=>`
    <div class="qa-item" id="qa-${i}">
      <button class="qa-remove" onclick="removeQA(${i})">✕</button>
      <div class="field-row" style="margin-bottom:8px"><div class="field-label">Question</div><input class="field-input" value="${esc(qa.q||'')}" onchange="saveQA(${i},'q',this.value)"></div>
      <div class="field-row"><div class="field-label">Answer</div><textarea class="field-input" onchange="saveQA(${i},'a',this.value)">${esc(qa.a||'')}</textarea></div>
    </div>`).join('');
}
function saveQA(i,f,v){if(currentIdx===null)return;if(!data[currentIdx].interview)data[currentIdx].interview=[];data[currentIdx].interview[i][f]=v;markDirty();}
function addQA(){if(currentIdx===null)return;if(!data[currentIdx].interview)data[currentIdx].interview=[];data[currentIdx].interview.push({q:'',a:''});document.getElementById('qaList').innerHTML=renderQAs(data[currentIdx].interview);markDirty();}
function removeQA(i){if(currentIdx===null)return;data[currentIdx].interview.splice(i,1);document.getElementById('qaList').innerHTML=renderQAs(data[currentIdx].interview);markDirty();}

function renderTracks(tracks){
  return tracks.map((t,i)=>{
    const tid=(t.url||'').match(/\/track\/([^/]+)/)?.[1]||'';
    const cov=tid?`https://api.audiotool.com/track/${tid}/cover/256.jpg`:'';
    return `<div class="track-card" id="track-${i}">
      <div class="track-card-header">
        <div class="track-num">${i+1}</div>
        ${cov?`<img class="track-cover-preview" src="${cov}" onerror="this.style.display='none'" id="tc${i}">`:`<div style="width:40px;height:40px;background:var(--surface2);flex-shrink:0"></div>`}
        <div class="track-info"><div class="track-name-display" id="tnd${i}">${esc(t.name||'—')}</div><div class="track-artist-display" id="tad${i}">${esc(t.track_artist||'—')}</div></div>
      </div>
      <div class="track-url-row">
        <input class="field-input" id="turl${i}" placeholder="https://www.audiotool.com/track/..." value="${esc(t.url||'')}" onchange="saveTrackField(${i},'url',this.value)">
        <button class="track-lookup-btn" id="tlookup${i}" onclick="lookupTrack(${i})">LOOKUP</button>
      </div>
      <div class="fields-2col" style="margin-bottom:10px">
        <div class="field-row"><div class="field-label">Track Name</div><input class="field-input" id="tname${i}" value="${esc(t.name||'')}" onchange="saveTrackField(${i},'name',this.value)"></div>
        <div class="field-row"><div class="field-label">Artist</div><input class="field-input" id="tartist${i}" value="${esc(t.track_artist||'')}" onchange="saveTrackField(${i},'track_artist',this.value)"></div>
      </div>
      <div class="field-row"><div class="field-label">Description (why I picked this)</div><textarea class="field-input" style="min-height:60px" onchange="saveTrackField(${i},'desc',this.value)">${esc(t.desc||'')}</textarea></div>
    </div>`;
  }).join('');
}

async function lookupTrack(i){
  const url=document.getElementById(`turl${i}`).value.trim();
  if(!url)return;
  const m=url.match(/\/track\/([^/?\s]+)/);
  if(!m){showToast('Invalid track URL',true);return;}
  const tid=m[1].replace(/\//g,'');
  const btn=document.getElementById(`tlookup${i}`);
  btn.disabled=true;btn.textContent='...';
  try{
    const r=await fetch(`https://api.audiotool.com/track/${tid}/eds/`);
    const xml=await r.text();
    const doc=new DOMParser().parseFromString(xml,'text/xml');
    const el=doc.querySelector('track');
    const name=el?.getAttribute('title')||tid;
    const artist=el?.getAttribute('user-name')||'';
    const trackUrl=`https://www.audiotool.com/track/${tid}/`;
    saveTrackField(i,'url',trackUrl);saveTrackField(i,'name',name);saveTrackField(i,'track_artist',artist);
    document.getElementById(`tname${i}`).value=name;
    document.getElementById(`tartist${i}`).value=artist;
    document.getElementById(`turl${i}`).value=trackUrl;
    document.getElementById(`tnd${i}`).textContent=name;
    document.getElementById(`tad${i}`).textContent=artist;
    const cov=document.getElementById(`tc${i}`);
    if(cov){cov.src=`https://api.audiotool.com/track/${tid}/cover/256.jpg`;cov.style.display='block';}
    showToast(`✓ ${name}`);
  }catch(e){
    saveTrackField(i,'url',`https://www.audiotool.com/track/${tid}/`);
    showToast('API blocked — fill name/artist manually',true);
  }
  btn.disabled=false;btn.textContent='LOOKUP';
}

function saveTrackField(i,f,v){
  if(currentIdx===null)return;
  if(!data[currentIdx].tracks)data[currentIdx].tracks=[];
  while(data[currentIdx].tracks.length<=i)data[currentIdx].tracks.push({url:'',name:'',track_artist:'',desc:''});
  data[currentIdx].tracks[i][f]=v;markDirty();
}

function save(f,v){if(currentIdx===null)return;data[currentIdx][f]=v;markDirty();}
function saveSocial(f,v,alsoRoot=false){if(currentIdx===null)return;if(!data[currentIdx].social)data[currentIdx].social={};data[currentIdx].social[f]=v;if(alsoRoot)data[currentIdx][f]=v;markDirty();}

function pickFromImage(e,imgId){
  const img=document.getElementById(imgId);
  const canvas=document.getElementById(imgId.replace('Img','Canvas'));
  const ctx=canvas.getContext('2d');
  const rect=img.getBoundingClientRect();
  const x=Math.round((e.clientX-rect.left)*(img.naturalWidth/rect.width));
  const y=Math.round((e.clientY-rect.top)*(img.naturalHeight/rect.height));
  canvas.width=img.naturalWidth||img.width;canvas.height=img.naturalHeight||img.height;
  try{
    ctx.drawImage(img,0,0);
    const px=ctx.getImageData(x,y,1,1).data;
    const hex='#'+[px[0],px[1],px[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
    lastPickedColor=hex;
    const el=document.getElementById('pickedColor');
    el.textContent=hex;el.style.color=hex;el.style.background='#1c1c1c';el.style.padding='2px 6px';
  }catch(e){
    document.getElementById('pickedColor').textContent='CORS blocked — use picker directly';
    document.getElementById('pickedColor').style.color='var(--red)';
  }
}

function assignColorBoth(){if(!lastPickedColor)return;syncColor('color1',lastPickedColor);syncColor('color2',lastPickedColor);syncColor('color_accent',lastPickedColor);document.getElementById('color1Picker').value=lastPickedColor;document.getElementById('color1Text').value=lastPickedColor;}
function assignColor(f){if(!lastPickedColor)return;syncColor(f,lastPickedColor);document.getElementById(`${f}Picker`).value=lastPickedColor;document.getElementById(`${f}Text`).value=lastPickedColor;}
function syncColor(f,v){if(currentIdx===null)return;data[currentIdx][f]=v;const t=document.getElementById(`${f}Text`),p=document.getElementById(`${f}Picker`);if(t)t.value=v;if(p)p.value=v;const c1=data[currentIdx].color1||'#333',c2=data[currentIdx].color2||'#333',ca=data[currentIdx].color_accent||c1;updatePreview(c1,c2,ca);markDirty();}
function syncColorText(f,v){if(v.match(/^#[0-9a-fA-F]{6}$/))syncColor(f,v);}
function updatePreview(c1,c2,ca){const bg=document.getElementById('previewBg'),txt=document.getElementById('previewText');if(bg)bg.style.background=`linear-gradient(to right,${c1} 0%,#141414 40%,#141414 60%,${c2} 100%)`;if(txt)txt.style.color=ca;}
function markDirty(){dirty=true;document.getElementById('saveAllBtn').disabled=false;}

function saveArtist(){
  if(currentIdx===null)return;
  if(data[currentIdx].tracks)data[currentIdx].tracks=data[currentIdx].tracks.filter(t=>t.url&&t.url.trim());
  markDirty();
  const s=document.getElementById('saveStatus');
  s.textContent='Saved locally — click PUSH TO GITHUB to deploy';s.style.color='var(--green)';
  filterArtists();showToast('Saved locally!');
}

async function saveAll(){
  const btn=document.getElementById('saveAllBtn');btn.disabled=true;setStatus('Pushing to GitHub...');
  try{
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(data,null,2))));
    const r=await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${DATA_PATH}`,{method:'PUT',headers:{Authorization:`token ${GITHUB_TOKEN}`,Accept:'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({message:'Update artist data via admin',content,sha:fileSha})});
    const j=await r.json();
    if(j.content){fileSha=j.content.sha;dirty=false;setStatus('Pushed! GitHub Pages deploying...');showToast('PUSHED TO GITHUB ✓');}
    else throw new Error(j.message||'Unknown error');
  }catch(e){setStatus('Push failed: '+e.message);showToast('PUSH FAILED: '+e.message,true);btn.disabled=false;}
}

function showToast(m,isErr=false){const t=document.getElementById('toast');t.textContent=m;t.className=isErr?'show error':'show';setTimeout(()=>t.className='',2800);}
</script>
</body>
</html>
