<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — AT Featured Artists</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1c1c1c;
    --border: #2a2a2a;
    --text: #e8e4dc;
    --muted: #888;
    --dim: #444;
    --accent: #e8c840;
    --green: #4ade80;
    --red: #f87171;
    --block: 'Bebas Neue', Impact, sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--mono); font-size:13px; min-height:100vh; }

  /* LOGIN */
  #loginScreen {
    min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:24px;
  }
  .login-title { font-family:var(--block); font-size:32px; letter-spacing:.15em; color:var(--accent); }
  .login-sub { color:var(--muted); font-size:11px; letter-spacing:.1em; }
  .login-box { display:flex; gap:0; border:2px solid var(--border); }
  .login-box input {
    background:var(--surface); border:none; outline:none; color:var(--text); font-family:var(--mono);
    font-size:13px; padding:12px 16px; width:260px; letter-spacing:.05em;
  }
  .login-box button {
    background:var(--accent); border:none; color:var(--bg); font-family:var(--block);
    font-size:16px; letter-spacing:.1em; padding:12px 20px; cursor:pointer; transition:opacity .15s;
  }
  .login-box button:hover { opacity:.85; }
  .login-err { color:var(--red); font-size:11px; letter-spacing:.08em; display:none; }

  /* MAIN */
  #mainScreen { display:none; }

  header {
    border-bottom:2px solid var(--border); padding:0 32px; height:50px;
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(10,10,10,.95); position:sticky; top:0; z-index:100;
  }
  .hlogo { font-family:var(--block); font-size:18px; letter-spacing:.15em; color:var(--accent); }
  .hright { display:flex; align-items:center; gap:16px; }
  .save-all-btn {
    background:var(--accent); color:var(--bg); font-family:var(--block);
    font-size:14px; letter-spacing:.1em; padding:8px 20px; border:none; cursor:pointer;
    transition:opacity .15s; display:flex; align-items:center; gap:8px;
  }
  .save-all-btn:hover { opacity:.85; }
  .save-all-btn:disabled { opacity:.4; cursor:not-allowed; }
  .status-msg { font-size:11px; color:var(--muted); letter-spacing:.08em; }

  .layout { display:grid; grid-template-columns:280px 1fr; min-height:calc(100vh - 50px); }

  /* SIDEBAR */
  .sidebar {
    border-right:1px solid var(--border); overflow-y:auto; max-height:calc(100vh - 50px);
    position:sticky; top:50px;
  }
  .search-box {
    padding:12px; border-bottom:1px solid var(--border); position:sticky; top:0;
    background:var(--bg); z-index:10;
  }
  .search-box input {
    width:100%; background:var(--surface); border:1px solid var(--border); outline:none;
    color:var(--text); font-family:var(--mono); font-size:12px; padding:8px 12px;
    letter-spacing:.03em;
  }
  .artist-list { padding:8px 0; }
  .artist-item {
    padding:10px 16px; cursor:pointer; transition:background .1s;
    display:flex; align-items:center; justify-content:space-between; gap:8px;
  }
  .artist-item:hover { background:var(--surface); }
  .artist-item.active { background:var(--surface2); border-left:3px solid var(--accent); }
  .ai-name { font-family:var(--block); font-size:14px; letter-spacing:.06em; }
  .ai-dot {
    width:8px; height:8px; border-radius:50%; flex-shrink:0;
    background:var(--dim); border:1px solid var(--border);
  }
  .ai-dot.has-colors { background:var(--green); border-color:var(--green); }

  /* EDITOR */
  .editor { padding:40px; max-width:900px; }
  .ed-title { font-family:var(--block); font-size:36px; letter-spacing:.1em; margin-bottom:8px; }
  .ed-sub { color:var(--muted); font-size:11px; letter-spacing:.1em; margin-bottom:40px; }

  .ed-section { margin-bottom:40px; }
  .ed-section-title {
    font-family:var(--block); font-size:18px; letter-spacing:.12em; color:var(--accent);
    margin-bottom:16px; padding-bottom:8px; border-bottom:1px solid var(--border);
    text-transform:uppercase;
  }

  /* COLOR SECTION */
  .color-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:24px; margin-bottom:24px; }
  .color-field label {
    display:block; font-size:10px; letter-spacing:.15em; text-transform:uppercase;
    color:var(--muted); margin-bottom:8px;
  }
  .color-picker-row { display:flex; align-items:center; gap:0; border:1px solid var(--border); }
  .color-picker-row input[type=color] {
    width:44px; height:40px; border:none; padding:2px; background:var(--surface);
    cursor:pointer; flex-shrink:0;
  }
  .color-picker-row input[type=text] {
    flex:1; background:var(--surface); border:none; border-left:1px solid var(--border);
    color:var(--text); font-family:var(--mono); font-size:13px; padding:0 12px; height:40px;
    outline:none; letter-spacing:.05em;
  }

  /* COVER + PHOTO PREVIEW */
  .preview-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:24px; }
  .preview-box { }
  .preview-label { font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .preview-img {
    width:100%; aspect-ratio:1; object-fit:cover; display:block;
    border:1px solid var(--border); background:var(--surface);
    cursor:crosshair; position:relative;
  }
  .preview-img-wrap { position:relative; }
  .preview-img-wrap canvas { display:none; }
  .pipette-hint {
    font-size:10px; color:var(--dim); letter-spacing:.08em; margin-top:6px;
  }

  /* COLOR PREVIEW BAR */
  .color-preview {
    height:60px; border:1px solid var(--border); margin-bottom:24px; position:relative; overflow:hidden;
    display:flex; align-items:center; justify-content:center;
  }
  .color-preview-bg {
    position:absolute; inset:0;
    background:linear-gradient(to right, var(--c1,#222) 0%, var(--bg) 40%, var(--bg) 60%, var(--c2,#222) 100%);
  }
  .color-preview-text {
    position:relative; font-family:var(--block); font-size:20px; letter-spacing:.15em;
    color:var(--c-accent,#e8c840);
  }

  /* SAVE BTN */
  .save-btn {
    background:var(--accent); color:var(--bg); font-family:var(--block);
    font-size:18px; letter-spacing:.12em; padding:12px 32px; border:none; cursor:pointer;
    transition:opacity .15s;
  }
  .save-btn:hover { opacity:.85; }
  .save-btn:disabled { opacity:.4; cursor:not-allowed; }
  .save-status { margin-left:16px; font-size:11px; color:var(--muted); letter-spacing:.08em; }

  /* EMPTY STATE */
  .empty { color:var(--dim); font-size:13px; letter-spacing:.08em; padding:40px; }

  /* TOAST */
  #toast {
    position:fixed; bottom:24px; right:24px; padding:12px 24px;
    font-family:var(--block); font-size:16px; letter-spacing:.1em;
    background:var(--green); color:#000;
    opacity:0; transition:opacity .3s; pointer-events:none; z-index:999;
  }
  #toast.show { opacity:1; }
  #toast.error { background:var(--red); }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-title">AT // ADMIN</div>
  <div class="login-sub">FEATURED ARTISTS CONTROL PANEL</div>
  <div style="display:flex;flex-direction:column;gap:12px">
    <div class="login-box">
      <input type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-box">
      <input type="password" id="tokenInput" placeholder="GitHub Token" onkeydown="if(event.key==='Enter')doLogin()">
      <button onclick="doLogin()">ENTER</button>
    </div>
  </div>
  <div class="login-err" id="loginErr">WRONG PASSWORD</div>
</div>

<div id="mainScreen">
  <header>
    <div class="hlogo">AT // ADMIN</div>
    <div class="hright">
      <span class="status-msg" id="statusMsg"></span>
      <button class="save-all-btn" id="saveAllBtn" onclick="saveAll()" disabled>
        <span>⬆</span> PUSH TO GITHUB
      </button>
    </div>
  </header>
  <div class="layout">
    <div class="sidebar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search artists..." oninput="filterArtists()">
      </div>
      <div class="artist-list" id="artistList"></div>
    </div>
    <div class="editor" id="editor">
      <div class="empty">← Select an artist to edit colors</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// CONFIG
let GITHUB_TOKEN = '';
const GITHUB_REPO = 'SnadBreugen/AT-featured-artists';
const DATA_PATH = 'data.json';
const PASSWORD = 'audiotool2026';

let data = [];
let currentIdx = null;
let dirty = false;
let fileSha = '';

// LOGIN
function doLogin(){
  const pw = document.getElementById('pwInput').value;
  const tok = document.getElementById('tokenInput').value.trim();
  if(pw === PASSWORD && tok){
    GITHUB_TOKEN = tok;
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('mainScreen').style.display='block';
    loadData();
  } else {
    document.getElementById('loginErr').style.display='block';
    document.getElementById('loginErr').textContent = !tok ? 'ENTER GITHUB TOKEN' : 'WRONG PASSWORD';
  }
}

// LOAD DATA FROM GITHUB
async function loadData(){
  setStatus('Loading...');
  try {
    const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${DATA_PATH}`,{
      headers:{ Authorization:`token ${GITHUB_TOKEN}`, Accept:'application/vnd.github.v3+json' }
    });
    const json = await resp.json();
    fileSha = json.sha;
    data = JSON.parse(atob(json.content.replace(/\n/g,'')));
    renderList(data);
    setStatus(`${data.length} artists loaded`);
  } catch(e){
    setStatus('Error loading data');
    console.error(e);
  }
}

function setStatus(msg){ document.getElementById('statusMsg').textContent=msg; }

// RENDER LIST
function renderList(artists){
  const list = document.getElementById('artistList');
  list.innerHTML = artists.map((a,i)=>{
    const hasColors = !!(a.color1 && a.color2);
    const realIdx = data.indexOf(a);
    return `<div class="artist-item ${currentIdx===realIdx?'active':''}" onclick="selectArtist(${realIdx})">
      <span class="ai-name">${a.artist}</span>
      <span class="ai-dot ${hasColors?'has-colors':''}" title="${hasColors?'Colors set':'No colors'}"></span>
    </div>`;
  }).join('');
}

function filterArtists(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = data.filter(a=>a.artist.toLowerCase().includes(q));
  renderList(filtered);
}

// SELECT ARTIST
function selectArtist(idx){
  currentIdx = idx;
  const a = data[idx];
  renderList(document.getElementById('searchInput').value
    ? data.filter(x=>x.artist.toLowerCase().includes(document.getElementById('searchInput').value.toLowerCase()))
    : data);

  const albumMatch = (a.album_url||'').match(/\/album\/([^/]+)/);
  const albumId = albumMatch ? albumMatch[1] : null;
  const coverUrl = a.cover_url || (albumId ? `https://api.audiotool.com/album/${albumId}/cover/256.jpg` : '');

  const c1 = a.color1 || '#e8c840';
  const c2 = a.color2 || '#c8a830';
  const ca = a.color_accent || c1;

  document.getElementById('editor').innerHTML = `
    <div class="ed-title">${a.artist}</div>
    <div class="ed-sub">${a.real_name||''} &nbsp;·&nbsp; ${a.date||''}</div>

    <div class="ed-section">
      <div class="ed-section-title">Color Preview</div>
      <div class="color-preview" id="colorPreview">
        <div class="color-preview-bg" id="previewBg"></div>
        <div class="color-preview-text" id="previewText">${a.artist.toUpperCase()}</div>
      </div>
    </div>

    <div class="ed-section">
      <div class="ed-section-title">Images — Click to pick color</div>
      <div class="preview-grid">
        ${coverUrl ? `
          <div class="preview-box">
            <div class="preview-label">Album Cover</div>
            <div class="preview-img-wrap">
              <img src="${coverUrl}" class="preview-img" id="coverImg"
                onclick="pickFromImage(event,'coverImg')"
                onerror="this.style.opacity='.3'">
              <canvas id="coverCanvas"></canvas>
            </div>
            <div class="pipette-hint">Click image to pick color → assign below</div>
          </div>
        ` : '<div class="preview-box"><div class="preview-label">No album cover</div></div>'}
        ${a.photo ? `
          <div class="preview-box">
            <div class="preview-label">Artist Photo</div>
            <div class="preview-img-wrap">
              <img src="${a.photo}" class="preview-img" id="photoImg"
                onclick="pickFromImage(event,'photoImg')"
                onerror="this.style.opacity='.3'">
              <canvas id="photoCanvas"></canvas>
            </div>
            <div class="pipette-hint">Click image to pick color → assign below</div>
          </div>
        ` : ''}
      </div>
      <div style="font-size:11px;color:var(--dim);margin-top:-12px;margin-bottom:24px;letter-spacing:.06em">
        Last picked: <span id="pickedColor" style="font-family:var(--mono)">—</span>
        &nbsp;
        <button onclick="assignColor('color1')" style="background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:10px;padding:4px 10px;cursor:pointer;letter-spacing:.06em;">→ BG TOP</button>
        <button onclick="assignColor('color2')" style="background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:10px;padding:4px 10px;cursor:pointer;letter-spacing:.06em;">→ BG BOTTOM</button>
        <button onclick="assignColor('color_accent')" style="background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:10px;padding:4px 10px;cursor:pointer;letter-spacing:.06em;">→ ACCENT</button>
      </div>
    </div>

    <div class="ed-section">
      <div class="ed-section-title">Colors</div>
      <div class="color-grid">
        <div class="color-field">
          <label>Background Top (color1)</label>
          <div class="color-picker-row">
            <input type="color" id="color1Picker" value="${c1}" oninput="syncColor('color1',this.value)">
            <input type="text" id="color1Text" value="${c1}" oninput="syncColorText('color1',this.value)" maxlength="7">
          </div>
        </div>
        <div class="color-field">
          <label>Background Bottom (color2)</label>
          <div class="color-picker-row">
            <input type="color" id="color2Picker" value="${c2}" oninput="syncColor('color2',this.value)">
            <input type="text" id="color2Text" value="${c2}" oninput="syncColorText('color2',this.value)" maxlength="7">
          </div>
        </div>
        <div class="color-field">
          <label>Accent / Headlines</label>
          <div class="color-picker-row">
            <input type="color" id="color_accentPicker" value="${ca}" oninput="syncColor('color_accent',this.value)">
            <input type="text" id="color_accentText" value="${ca}" oninput="syncColorText('color_accent',this.value)" maxlength="7">
          </div>
        </div>
      </div>
    </div>

    <div>
      <button class="save-btn" onclick="saveArtist()">SAVE ARTIST</button>
      <span class="save-status" id="saveStatus"></span>
    </div>
  `;
  updatePreview(c1, c2, ca);
}

// PICK COLOR FROM IMAGE
let lastPickedColor = null;
function pickFromImage(event, imgId){
  const img = document.getElementById(imgId);
  const canvasId = imgId.replace('Img','Canvas');
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');

  // Draw image to canvas (may fail due to CORS - show picked coords instead)
  const rect = img.getBoundingClientRect();
  const scaleX = img.naturalWidth / rect.width;
  const scaleY = img.naturalHeight / rect.height;
  const x = Math.round((event.clientX - rect.left) * scaleX);
  const y = Math.round((event.clientY - rect.top) * scaleY);

  canvas.width = img.naturalWidth || img.width;
  canvas.height = img.naturalHeight || img.height;

  try {
    ctx.drawImage(img, 0, 0);
    const pixel = ctx.getImageData(x, y, 1, 1).data;
    const hex = '#' + [pixel[0],pixel[1],pixel[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
    lastPickedColor = hex;
    document.getElementById('pickedColor').textContent = hex;
    document.getElementById('pickedColor').style.color = hex;
    document.getElementById('pickedColor').style.background = '#1c1c1c';
    document.getElementById('pickedColor').style.padding = '2px 6px';
  } catch(e) {
    // CORS blocked - show a message
    document.getElementById('pickedColor').textContent = 'CORS blocked — use color picker directly';
    document.getElementById('pickedColor').style.color = 'var(--red)';
  }
}

function assignColor(field){
  if(!lastPickedColor) return;
  syncColor(field, lastPickedColor);
  document.getElementById(`${field}Picker`).value = lastPickedColor;
  document.getElementById(`${field}Text`).value = lastPickedColor;
}

// SYNC COLOR
function syncColor(field, val){
  if(currentIdx===null) return;
  data[currentIdx][field] = val;
  document.getElementById(`${field}Text`).value = val;
  document.getElementById(`${field}Picker`).value = val;
  const c1 = data[currentIdx].color1||'#222';
  const c2 = data[currentIdx].color2||'#222';
  const ca = data[currentIdx].color_accent||c1;
  updatePreview(c1,c2,ca);
  markDirty();
}

function syncColorText(field, val){
  if(val.match(/^#[0-9a-fA-F]{6}$/)){
    syncColor(field, val);
  }
}

function updatePreview(c1,c2,ca){
  const bg = document.getElementById('previewBg');
  const txt = document.getElementById('previewText');
  if(bg) bg.style.background=`linear-gradient(to right, ${c1} 0%, #141414 40%, #141414 60%, ${c2} 100%)`;
  if(txt) txt.style.color=ca;
}

function markDirty(){
  dirty=true;
  document.getElementById('saveAllBtn').disabled=false;
}

// SAVE SINGLE ARTIST (marks dirty, enables push)
function saveArtist(){
  if(currentIdx===null) return;
  const btn = document.querySelector('.save-btn');
  const status = document.getElementById('saveStatus');
  btn.disabled=true;
  status.textContent='Saved locally — click PUSH TO GITHUB to deploy';
  status.style.color='var(--green)';
  btn.disabled=false;
  markDirty();
  // Refresh dot in list
  filterArtists();
  const q = document.getElementById('searchInput').value;
  renderList(q ? data.filter(x=>x.artist.toLowerCase().includes(q.toLowerCase())) : data);
  showToast('Saved locally!');
}

// PUSH ALL TO GITHUB
async function saveAll(){
  const btn = document.getElementById('saveAllBtn');
  btn.disabled=true;
  setStatus('Pushing to GitHub...');
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
    const resp = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${DATA_PATH}`,{
      method:'PUT',
      headers:{
        Authorization:`token ${GITHUB_TOKEN}`,
        Accept:'application/vnd.github.v3+json',
        'Content-Type':'application/json'
      },
      body: JSON.stringify({
        message:'Update artist colors via admin',
        content: content,
        sha: fileSha
      })
    });
    const json = await resp.json();
    if(json.content){
      fileSha = json.content.sha;
      dirty=false;
      setStatus('Pushed! GitHub Pages deploying...');
      showToast('PUSHED TO GITHUB ✓');
    } else {
      throw new Error(json.message||'Unknown error');
    }
  } catch(e){
    setStatus('Push failed: '+e.message);
    showToast('PUSH FAILED: '+e.message, true);
    btn.disabled=false;
  }
}

function showToast(msg, isError=false){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className=isError?'show error':'show';
  setTimeout(()=>t.className='',2800);
}
</script>
</body>
</html>
