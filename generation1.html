<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Featured Artists Gen I — Audiotool</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lexend+Deca&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e; --surface: #141414; --surface2: #1a1a1a;
    --border: #222; --text: #ffffff; --text-dim: #aaaaaa;
    --accent: #e8c840; --gen-color: #28E5FF;
    --block: "Bebas Neue", Impact, sans-serif;
    --type: "Lexend Deca", sans-serif;
    --max: 1400px; --pad: 40px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--type); min-height:100vh; overflow-x:hidden; }

  #bgWash { position:fixed; inset:0; pointer-events:none; z-index:0; opacity:0; transition:opacity 1.2s; }
  #bgWash.on { opacity:1; }

  header {
    border-bottom:2px solid var(--border); padding:0 var(--pad); height:50px;
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(14,14,14,.96); position:sticky; top:0; z-index:100;
  }
  .logo { font-family:var(--block); font-size:16px; letter-spacing:.15em; color:var(--text); text-decoration:none; }
  .logo .slash { color:var(--accent); }
  .header-right { display:flex; align-items:center; gap:20px; }
  .gen-link { font-family:var(--block); font-size:13px; letter-spacing:.12em; color:var(--text-dim); text-decoration:none; transition:color .15s; }
  .gen-link:hover { color:var(--gen-color); }
  .gen-link.active { color:var(--gen-color); }

  .tagline { padding:16px var(--pad); border-bottom:1px solid var(--border); background:var(--surface); position:relative; z-index:1; }
  .tagline span { font-family:var(--type); font-size:20px; color:var(--text); letter-spacing:.02em; line-height:1.3; }

  .quote-bar {
    position:relative; z-index:1;
    transition:background .8s ease;
    height:260px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    overflow:hidden;
    padding:0 var(--pad);
  }
  .quote-bar::after {
    content:''; position:absolute; inset:0;
    background:url('grunge.png') center/cover;
    opacity:0.12; mix-blend-mode:multiply; pointer-events:none;
  }
  .quote-label { font-family:var(--block); font-size:20px; letter-spacing:.3em; color:rgba(0,0,0,0.7); position:absolute; top:16px; left:var(--pad, 40px); }
  .quote-content { transition:opacity .6s ease; width:100%; display:flex; align-items:center; justify-content:center; }
  .quote-content.fade { opacity:0; }
  .quote-text { font-family:var(--block); font-size:clamp(22px,3vw,44px); color:#0a0a0a; line-height:1.05; letter-spacing:.02em; width:100%; text-align:left; text-wrap:balance; }
  .quote-author { font-family:var(--block); font-size:clamp(80px,12vw,160px); line-height:0.85; letter-spacing:-0.02em; color:#0a0a0a; text-align:center; width:100%; white-space:nowrap; overflow:hidden; }

  .hero-wrap { position:relative; z-index:1; border-bottom:2px solid var(--border); }
  .hero-spacer { height:32px; background:var(--bg); border-bottom:1px solid var(--border); }
  .hero-tag { padding:12px var(--pad); background:#ffffff; font-family:var(--block); font-size:18px; letter-spacing:.25em; color:#0e0e0e; border-bottom:1px solid var(--border); }
  .hero { max-width:var(--max); margin:0 auto; padding:56px var(--pad) 64px; display:grid; grid-template-columns:1fr 450px; gap:72px; align-items:center; }
  .hero-name { font-family:var(--block); font-size:clamp(80px,12vw,160px); line-height:0.85; letter-spacing:-0.02em; margin-bottom:14px; text-transform:uppercase; }
  .hero-realname { font-family:var(--block); font-size:15px; letter-spacing:.2em; color:var(--text-dim); margin-bottom:28px; }
  .hero-intro { font-size:13px; line-height:1.85; color:var(--text-dim); max-width:560px; font-style:italic; border-left:3px solid var(--accent); padding-left:18px; margin-bottom:36px; }
  .hero-cta { display:inline-block; font-family:var(--block); font-size:15px; letter-spacing:.15em; padding:11px 30px; text-decoration:none; transition:opacity .15s; background:var(--accent); color:#0e0e0e; }
  .hero-cta:hover { opacity:.85; }
  .hero-photo-col { position:relative; overflow:hidden; }
  .hero-photo { width:100%; aspect-ratio:1; object-fit:cover; object-position:center; display:block; border:1px solid var(--border); background:var(--surface2); }
  .hero-photo-placeholder { width:100%; aspect-ratio:1; background:var(--surface2); }

  .logos-bar { border-bottom:1px solid var(--border); padding:20px var(--pad); display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1; background:rgba(14,14,14,.5); }

  .search-bar { border-bottom:1px solid var(--border); padding:14px var(--pad); display:flex; align-items:center; gap:16px; flex-wrap:wrap; position:relative; z-index:1; }
  .search-input { background:var(--surface); border:1px solid var(--border); outline:none; color:var(--text); font-family:var(--type); font-size:13px; padding:9px 14px; width:300px; transition:border-color .15s; }
  .search-input:focus { border-color:var(--gen-color); }
  .search-input::placeholder { color:var(--text-dim); }
  .search-count { font-family:var(--block); font-size:12px; letter-spacing:.1em; color:var(--text-dim); }
  .sort-btns { display:flex; gap:6px; margin-left:auto; flex-wrap:wrap; }
  .sort-btn { font-family:var(--block); font-size:12px; letter-spacing:.1em; padding:6px 14px; border:1px solid var(--border); background:var(--surface); color:var(--text-dim); cursor:pointer; transition:all .15s; }
  .sort-btn:hover { border-color:var(--gen-color); color:var(--gen-color); }
  .sort-btn.active { border-color:var(--gen-color); color:var(--gen-color); background:rgba(40,229,255,.08); }

  .grid-section { max-width:var(--max); margin:0 auto; padding:36px var(--pad); position:relative; z-index:1; }
  .grid-title { font-family:var(--block); font-size:13px; letter-spacing:.2em; color:var(--text-dim); margin-bottom:24px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:1px; background:var(--border); }

  .card { background:var(--bg); text-decoration:none; display:flex; flex-direction:column; position:relative; overflow:hidden; transition:background .15s; cursor:pointer; }
  .card:hover { background:var(--surface); }
  .card-inner { display:flex; gap:0; flex:1; }
  .card-photo-wrap { width:140px; height:140px; flex-shrink:0; }
  .card-photo { width:100%; height:100%; object-fit:contain; object-position:center; display:block; transition:transform .3s; background:var(--surface2); }
  .card:hover .card-photo { transform:scale(1.04); }
  .card-photo-placeholder { width:100%; height:100%; min-height:140px; background:var(--surface2); }
  .card-info { flex:1; padding:16px 18px 14px; display:flex; flex-direction:column; justify-content:space-between; min-width:0; }
  .card-name { font-family:var(--block); font-size:clamp(28px,3vw,40px); letter-spacing:0.02em; line-height:0.88; color:var(--text); transition:color .15s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
  .card:hover .card-name { color:var(--card-accent, var(--accent)); }
  .card-real { font-size:10px; color:var(--text); margin-bottom:10px; }
  .card-year { font-family:var(--block); font-size:32px; letter-spacing:.04em; color:#444; line-height:1; margin-bottom:8px; }
  .card-intro { font-size:10px; line-height:1.65; color:var(--text-dim); font-style:italic; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card-bar { height:3px; width:100%; background:var(--border); flex-shrink:0; transition:background .25s; }
  .card:hover .card-bar { background:var(--card-accent, var(--accent)); }
  .no-results { padding:60px; text-align:center; color:var(--text-dim); font-family:var(--block); font-size:20px; letter-spacing:.15em; display:none; }

  @media(max-width:900px){ :root{--pad:20px;} .hero{grid-template-columns:1fr;gap:32px;} .hero-photo-col{order:-1;max-width:240px;} .grid{grid-template-columns:1fr;} .card-photo-wrap{width:120px;} .sort-btns{margin-left:0;} }
</style>

  <input class="search-input" id="searchInput" type="text" placeholder="Search artists..." oninput="doSearch()">
  <span class="search-count" id="searchCount"></span>
  <div class="sort-btns">
    <button class="sort-btn" onclick="setSort('random')" id="sort-random">RANDOM</button>
    <button class="sort-btn" onclick="setSort('az')" id="sort-az">A-Z</button>
    <button class="sort-btn" onclick="setSort('za')" id="sort-za">Z-A</button>
    <button class="sort-btn" onclick="setSort('newest')" id="sort-newest">NEWEST</button>
    <button class="sort-btn" onclick="setSort('oldest')" id="sort-oldest">OLDEST</button>
  </div>
</div>

<div class="grid-section">
  <div class="grid-title" id="gridTitle">ALL ARTISTS</div>
  <div class="grid" id="artistGrid"></div>
  <div class="no-results" id="noResults">NO ARTISTS FOUND</div>
</div>

<script>
const inIframe = window.self !== window.top;

function navigate(e, url){
  if(!inIframe) return;
  e.preventDefault();
  window.parent.postMessage({ type:'NAVIGATE', url: url }, '*');
}

let allArtists = [];
let currentSort = '';
let currentQuery = '';

Promise.all([
  fetch('gen1_data.json').then(r => r.json()),
  fetch('data.json').then(r => r.json())
]).then(([gen1, gen2]) => {
  allArtists = gen1;
  const visible = gen1.filter(a => !a.is_hidden);
  const allForQuotes = [...gen1, ...gen2].filter(a => !a.is_hidden);
  renderRandomHero(visible);
  renderRandomQuote(allForQuotes);
  update();
}).catch(() => {
  document.getElementById('noResults').style.display = 'block';
  document.getElementById('noResults').textContent = 'DATA NOT FOUND';
});

function renderRandomHero(artists){
  if(!artists.length) return;
  const withPhoto = artists.filter(a => a.photo);
  const a = withPhoto.length ? withPhoto[Math.floor(Math.random() * withPhoto.length)] : artists[Math.floor(Math.random() * artists.length)];
  const accent = a.color1 || a.color_accent || 'var(--accent)';
  const intro = (a.intro||'').replace(/</g,'&lt;');
  document.getElementById('heroWrap').style.display = 'block';
  document.getElementById('heroContent').innerHTML = `
    <div>
      <div class="hero-name" style="color:${accent}">${a.artist}</div>
      ${a.real_name && a.real_name !== a.artist ? `<div class="hero-realname">${a.real_name}</div>` : ''}
      ${intro ? `<div class="hero-intro" style="border-left-color:${accent}">${intro}</div>` : ''}
      <a href="artist_gen1.html?id=${encodeURIComponent(a.artist)}" class="hero-cta" style="background:${accent}" onclick="navigate(event,'artist_gen1.html?id=${encodeURIComponent(a.artist)}')">READ MORE ↗</a>
    </div>
    <div class="hero-photo-col">
      ${a.photo ? `<img src="${a.photo}" class="hero-photo" alt="${a.artist}" style="object-position:${a.photo_position||'center'}" onerror="this.outerHTML='<div class=hero-photo-placeholder></div>'">`
                : '<div class="hero-photo-placeholder"></div>'}
    </div>`;
  if(a.color1){
    try {
      const r=parseInt(a.color1.slice(1,3),16), g=parseInt(a.color1.slice(3,5),16), b=parseInt(a.color1.slice(5,7),16);
      document.getElementById('bgWash').style.background = `radial-gradient(ellipse 140% 90% at 20% -10%, rgba(${r},${g},${b},0.45) 0%, rgba(${r},${g},${b},0.15) 40%, transparent 70%)`;
      document.getElementById('bgWash').classList.add('on');
    } catch(e){}
  }
}

function renderRandomQuote(artists){
  const withQuotes = artists.filter(a => a.quote && a.quote.trim());
  if(!withQuotes.length) return;
  let current = Math.floor(Math.random() * withQuotes.length);
  const bar = document.getElementById('quoteBar');
  const contentEl = document.getElementById('quoteContent');
  const textEl = document.getElementById('quoteText');
  const authorEl = document.getElementById('quoteAuthor');
  const label = bar.querySelector('.quote-label');

  function show(idx){
    const q = withQuotes[idx];
    textEl.textContent = '"' + q.quote + '"';
    authorEl.textContent = '[' + q.artist + ']';
    bar.style.background = q.color1 || q.color_accent || '#28E5FF';
    if(label) label.style.color = 'rgba(0,0,0,0.75)';
  }

  show(current);
  bar.style.display = 'flex';
  setInterval(() => {
    contentEl.classList.add('fade');
    setTimeout(() => { current = (current + 1) % withQuotes.length; show(current); contentEl.classList.remove('fade'); }, 600);
  }, 6000);
}

function setSort(s){
  if(currentSort === s){ currentSort = ''; document.getElementById('sort-' + s).classList.remove('active'); }
  else { currentSort = s; document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active')); document.getElementById('sort-' + s).classList.add('active'); }
  if(s === 'random') renderRandomHero(allArtists.filter(a => !a.is_hidden));
  update();
}

function doSearch(){
  currentQuery = document.getElementById('searchInput').value.toLowerCase().trim();
  update();
}

function getSorted(artists){
  const arr = [...artists];
  if(currentSort === 'az') return arr.sort((a,b) => a.artist.localeCompare(b.artist));
  if(currentSort === 'za') return arr.sort((a,b) => b.artist.localeCompare(a.artist));
  if(currentSort === 'newest') return arr.sort((a,b) => (b.date||'').localeCompare(a.date||''));
  if(currentSort === 'oldest') return arr.sort((a,b) => (a.date||'').localeCompare(b.date||''));
  if(currentSort === 'random'){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; }
  return arr;
}

function update(){
  let visible = allArtists.filter(a => !a.is_hidden);
  if(currentQuery){
    visible = visible.filter(a => a.artist.toLowerCase().includes(currentQuery) || (a.real_name||'').toLowerCase().includes(currentQuery));
    document.getElementById('gridTitle').textContent = 'SEARCH RESULTS';
  } else {
    document.getElementById('gridTitle').textContent = 'ALL ARTISTS';
  }
  const sorted = getSorted(visible);
  document.getElementById('searchCount').textContent = sorted.length + ' ARTISTS';
  renderGrid(sorted);
}

function renderGrid(artists){
  const grid = document.getElementById('artistGrid');
  const noRes = document.getElementById('noResults');
  if(!artists.length){ grid.innerHTML=''; noRes.style.display='block'; return; }
  noRes.style.display = 'none';
  grid.innerHTML = artists.map(a => {
    const accent = a.color1 || a.color_accent || '';
    const accentStyle = accent ? `style="--card-accent:${accent}"` : '';
    const intro = (a.intro||'').slice(0,120).replace(/</g,'&lt;') + ((a.intro||'').length>120?'...':'');
    const year = (a.date||'').slice(0,4);
    const url = `artist_gen1.html?id=${encodeURIComponent(a.artist)}`;
    return `<a href="${url}" class="card" ${accentStyle} onclick="navigate(event,'${url}')">
      <div class="card-inner">
        <div class="card-photo-wrap">
          ${a.photo ? `<img src="${a.photo}" class="card-photo" style="object-position:${a.photo_position||'top'}" alt="${a.artist}" loading="lazy" onerror="this.outerHTML='<div class=card-photo-placeholder></div>'">`
                    : '<div class="card-photo-placeholder"></div>'}
        </div>
        <div class="card-info">
          <div class="card-top">
            <div class="card-name">${a.artist}</div>
            ${a.real_name ? `<div class="card-real">${a.real_name}</div>` : ''}
          </div>
          <div>
            ${year ? `<div class="card-year">${year}</div>` : ''}
            ${intro ? `<div class="card-intro">${intro}</div>` : ''}
          </div>
        </div>
      </div>
      <div class="card-bar"></div>
    </a>`;
  }).join('');
}
</script>
</body>
</html>
