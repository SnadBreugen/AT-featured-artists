<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featured Artists Gen I — Audiotool</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lexend+Deca&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e; --surface: #141414; --surface2: #1a1a1a;
    --border: #222; --text: #ffffff; --text-dim: #aaaaaa;
    --accent: #e8c840; --gen-color: #28E5FF;
    --block: "Bebas Neue", Impact, sans-serif;
    --type: "Lexend Deca", sans-serif;
    --max: 1400px; --pad: 40px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--type); min-height:100vh; overflow-x:hidden; }

  header {
    border-bottom:2px solid var(--border); padding:0 var(--pad); height:50px;
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(14,14,14,.96); position:sticky; top:0; z-index:100;
  }
  .logo { font-family:var(--block); font-size:16px; letter-spacing:.15em; color:var(--text); text-decoration:none; }
  .logo .slash { color:var(--accent); }
  .header-right { display:flex; align-items:center; gap:20px; }
  .gen-link { font-family:var(--block); font-size:13px; letter-spacing:.12em; color:var(--text-dim); text-decoration:none; transition:color .15s; }
  .gen-link:hover { color:var(--gen-color); }
  .gen-link.active { color:var(--gen-color); }

  .tagline { padding:16px var(--pad); border-bottom:1px solid var(--border); background:var(--surface); position:relative; z-index:1; }
  .tagline span { font-family:var(--type); font-size:20px; color:var(--text); letter-spacing:.02em; line-height:1.3; }

  .search-bar { border-bottom:1px solid var(--border); padding:14px var(--pad); display:flex; align-items:center; gap:16px; position:relative; z-index:1; }
  .search-input { background:var(--surface); border:1px solid var(--border); outline:none; color:var(--text); font-family:var(--type); font-size:13px; padding:9px 14px; width:300px; transition:border-color .15s; }
  .search-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:var(--text-dim); }
  .search-count { font-family:var(--block); font-size:12px; letter-spacing:.1em; color:var(--text-dim); }

  .grid-section { max-width:var(--max); margin:0 auto; padding:36px var(--pad); position:relative; z-index:1; }
  .grid-title { font-family:var(--block); font-size:13px; letter-spacing:.2em; color:var(--text-dim); margin-bottom:24px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:1px; background:var(--border); }

  /* CARD - identical to index.html */
  .card { background:var(--bg); text-decoration:none; display:flex; flex-direction:column; position:relative; overflow:hidden; transition:background .15s; cursor:pointer; }
  .card:hover { background:var(--surface); }
  .card-inner { display:flex; gap:0; flex:1; }
  .card-photo-wrap { width:140px; height:140px; flex-shrink:0; }
  .card-photo { width:100%; height:100%; object-fit:contain; object-position:center; display:block; transition:transform .3s; background:var(--surface2); }
  .card:hover .card-photo { transform:scale(1.04); filter:grayscale(0%); }
  .card-photo-placeholder { width:100%; height:100%; min-height:140px; background:var(--surface2); }
  .card-info { flex:1; padding:16px 18px 14px; display:flex; flex-direction:column; justify-content:space-between; min-width:0; }
  .card-name { font-family:var(--block); font-size:clamp(28px,3vw,40px); letter-spacing:0.02em; line-height:0.88; color:var(--text); transition:color .15s; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
  .card:hover .card-name { color:var(--card-accent, var(--accent)); }
  .card-real { font-size:10px; color:var(--text); margin-bottom:10px; }
  .card-year { font-family:var(--block); font-size:32px; letter-spacing:.04em; color:#444; line-height:1; margin-bottom:8px; }
  .card-intro { font-size:10px; line-height:1.65; color:var(--text-dim); font-style:italic; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card-bar { height:3px; width:100%; background:var(--border); flex-shrink:0; transition:background .25s; }
  .card:hover .card-bar { background:var(--card-accent, var(--accent)); }

  .no-results { padding:60px; text-align:center; color:var(--text-dim); font-family:var(--block); font-size:20px; letter-spacing:.15em; display:none; }

  @media(max-width:900px){ :root{--pad:20px;} .grid{grid-template-columns:1fr;} .card-photo-wrap{width:120px;} }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">AUDIOTOOL <span class="slash">//</span> FEATURED ARTISTS</a>
  <div class="header-right">
    <a href="index.html" class="gen-link">GEN II</a>
    <a href="generation1.html" class="gen-link active">GEN I</a>
  </div>
</header>

<div class="tagline">
  <span>First Generation of Featured Artists | Edition Audiotool</span>
</div>

<div class="search-bar">
  <input class="search-input" id="searchInput" type="text" placeholder="Search artists..." oninput="doSearch()">
  <span class="search-count" id="searchCount"></span>
</div>

<div class="grid-section">
  <div class="grid-title" id="gridTitle">ALL ARTISTS</div>
  <div class="grid" id="artistGrid"></div>
  <div class="no-results" id="noResults">NO ARTISTS FOUND</div>
</div>

<script>
let allArtists = [];

fetch('gen1_data.json')
  .then(r => r.json())
  .then(data => {
    allArtists = data;
    const visible = data.filter(a => !a.is_hidden);
    document.getElementById('searchCount').textContent = visible.length + ' ARTISTS';
    renderGrid(visible);
  })
  .catch(() => {
    document.getElementById('noResults').style.display = 'block';
    document.getElementById('noResults').textContent = 'DATA NOT FOUND';
  });

function renderGrid(artists) {
  const grid = document.getElementById('artistGrid');
  const noRes = document.getElementById('noResults');
  if (!artists.length) { grid.innerHTML = ''; noRes.style.display = 'block'; return; }
  noRes.style.display = 'none';
  grid.innerHTML = artists.map(a => {
    const accent = a.color1 || a.color_accent || '';
    const accentStyle = accent ? `style="--card-accent:${accent}"` : '';
    const intro = (a.intro||'').slice(0,120).replace(/</g,'&lt;') + ((a.intro||'').length>120?'...':'');
    const year = (a.date||'').slice(0,4);
    return `<a href="artist_gen1.html?id=${encodeURIComponent(a.artist)}" class="card" ${accentStyle}>
      <div class="card-inner">
        <div class="card-photo-wrap">
          ${a.photo
            ? `<img src="${a.photo}" class="card-photo" style="object-position:${a.photo_position||'top'}" alt="${a.artist}" loading="lazy" onerror="this.outerHTML='<div class=card-photo-placeholder></div>'">`
            : '<div class="card-photo-placeholder"></div>'}
        </div>
        <div class="card-info">
          <div class="card-top">
            <div class="card-name">${a.artist}</div>
            ${a.real_name ? `<div class="card-real">${a.real_name}</div>` : ''}
          </div>
          <div>
            ${year ? `<div class="card-year">${year}</div>` : ''}
            ${intro ? `<div class="card-intro">${intro}</div>` : ''}
          </div>
        </div>
      </div>
      <div class="card-bar"></div>
    </a>`;
  }).join('');
}

function doSearch() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const visible = allArtists.filter(a => !a.is_hidden);
  if (!q) {
    document.getElementById('searchCount').textContent = visible.length + ' ARTISTS';
    document.getElementById('gridTitle').textContent = 'ALL ARTISTS';
    renderGrid(visible);
    return;
  }
  const results = visible.filter(a =>
    a.artist.toLowerCase().includes(q) || (a.real_name||'').toLowerCase().includes(q)
  );
  document.getElementById('searchCount').textContent = results.length + ' RESULTS';
  document.getElementById('gridTitle').textContent = 'SEARCH RESULTS';
  renderGrid(results);
}
</script>
</body>
</html>
