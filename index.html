<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featured Artists — Audiotool</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e; --surface: #141414; --surface2: #1a1a1a;
    --border: #222; --text: #e8e4dc; --text-dim: #888;
    --accent: #e8c840;
    --block: "Bebas Neue", Impact, sans-serif;
    --type: "Special Elite", serif;
    --max: 1400px; --pad: 40px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--type); min-height:100vh; overflow-x:hidden; }

  #bgWash { position:fixed; inset:0; pointer-events:none; z-index:0; opacity:0; transition:opacity 1.2s; }
  #bgWash.on { opacity:1; }

  header {
    border-bottom:2px solid var(--border); padding:0 var(--pad); height:50px;
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(14,14,14,.96); position:sticky; top:0; z-index:100;
  }
  .logo { font-family:var(--block); font-size:16px; letter-spacing:.15em; color:var(--text); text-decoration:none; }
  .logo .slash { color:var(--accent); }
  .header-count { font-family:var(--block); font-size:13px; letter-spacing:.1em; color:var(--text-dim); }

  .search-bar {
    border-bottom:1px solid var(--border); padding:14px var(--pad);
    display:flex; align-items:center; gap:16px; position:relative; z-index:1;
  }
  .search-input {
    background:var(--surface); border:1px solid var(--border); outline:none;
    color:var(--text); font-family:var(--type); font-size:13px; padding:9px 14px;
    width:300px; transition:border-color .15s;
  }
  .search-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:var(--text-dim); }
  .search-count { font-family:var(--block); font-size:12px; letter-spacing:.1em; color:var(--text-dim); }

  /* HERO */
  .hero-wrap { position:relative; z-index:1; border-bottom:2px solid var(--border); }
  .hero-tag {
    padding:10px var(--pad); background:rgba(14,14,14,.6);
    font-family:var(--block); font-size:11px; letter-spacing:.25em; color:var(--accent);
    border-bottom:1px solid var(--border);
  }
  .hero {
    max-width:var(--max); margin:0 auto; padding:56px var(--pad) 64px;
    display:grid; grid-template-columns:1fr 320px; gap:72px; align-items:center;
  }
  .hero-name { font-family:var(--block); font-size:clamp(72px,9vw,130px); line-height:.88; letter-spacing:.04em; margin-bottom:12px; }
  .hero-realname { font-family:var(--block); font-size:15px; letter-spacing:.2em; color:var(--text-dim); margin-bottom:28px; }
  .hero-intro {
    font-size:13px; line-height:1.85; color:var(--text-dim); max-width:560px;
    font-style:italic; border-left:3px solid var(--accent); padding-left:18px; margin-bottom:36px;
  }
  .hero-cta {
    display:inline-block; font-family:var(--block); font-size:15px; letter-spacing:.15em;
    padding:11px 30px; text-decoration:none; transition:opacity .15s;
    background:var(--accent); color:#0e0e0e;
  }
  .hero-cta:hover { opacity:.85; }
  .hero-photo-col { position:relative; overflow:hidden; }
  .hero-photo { width:100%; aspect-ratio:3/4; object-fit:cover; object-position:top; display:block; border:1px solid var(--border); }
  .hero-photo-placeholder { width:100%; aspect-ratio:3/4; background:var(--surface2); }
  .hero-photo-label {
    position:absolute; bottom:0; left:0; right:0;
    font-family:var(--block); font-size:10px; letter-spacing:.15em;
  }

  /* GRID */
  .grid-section { max-width:var(--max); margin:0 auto; padding:36px var(--pad); position:relative; z-index:1; }
  .grid-title { font-family:var(--block); font-size:13px; letter-spacing:.2em; color:var(--text-dim); margin-bottom:24px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:1px; background:var(--border); }

  /* CARD — horizontal layout like mockup */
  .card {
    background:var(--bg); text-decoration:none; display:flex; flex-direction:column;
    position:relative; overflow:hidden; transition:background .15s; cursor:pointer;
  }
  .card:hover { background:var(--surface); }

  .card-inner { display:flex; gap:0; flex:1; }

  /* Photo block — fixed width, square */
  .card-photo-wrap {
    width:140px; flex-shrink:0; position:relative; overflow:hidden;
  }
  .card-photo {
    width:100%; height:100%; object-fit:cover; object-position:top;
    display:block; transition:transform .3s; filter:grayscale(10%);
  }
  .card:hover .card-photo { transform:scale(1.04); filter:grayscale(0%); }
  .card-photo-placeholder { width:100%; height:100%; min-height:140px; background:var(--surface2); }
  .card-feat-label {
    position:absolute; bottom:0; left:0; right:0;
    background:var(--card-accent, var(--accent)); padding:4px 8px;
    display:flex; align-items:center; justify-content:space-between;
    font-family:var(--block); font-size:9px; letter-spacing:.1em; color:#0e0e0e;
    z-index:2;
  }
  .card-photo-label {
    position:absolute; bottom:0; left:0; right:0; padding:5px 8px;
    background:rgba(14,14,14,.85);
    font-family:var(--block); font-size:9px; letter-spacing:.12em; color:var(--text-dim);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }


  /* Info block */
  .card-info {
    flex:1; padding:16px 18px 14px; display:flex; flex-direction:column; justify-content:space-between; min-width:0;
  }
  .card-top {}
  .card-name {
    font-family:var(--block); font-size:28px; letter-spacing:.06em; line-height:.95;
    color:var(--text); transition:color .15s;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px;
  }
  .card:hover .card-name { color:var(--card-accent, var(--accent)); }
  .card-real { font-size:10px; color:var(--text); margin-bottom:10px; }
  .card-year { font-family:var(--block); font-size:32px; letter-spacing:.04em; color:#444; line-height:1; margin-bottom:8px; }
  .card-intro { font-size:10px; line-height:1.65; color:var(--text-dim); font-style:italic;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

  /* bottom accent bar */
  .card-bar { height:3px; width:100%; background:var(--card-accent, var(--border)); flex-shrink:0; }

  .no-results { padding:60px; text-align:center; color:var(--text-dim); font-family:var(--block); font-size:20px; letter-spacing:.15em; display:none; }

  @media(max-width:900px){
    :root{--pad:20px;}
    .hero{grid-template-columns:1fr;gap:32px;}
    .hero-photo-col{order:-1;max-width:240px;}
    .grid{grid-template-columns:1fr;}
    .card-photo-wrap{width:120px;}
  }
</style>
</head>
<body>

<div id="bgWash"></div>

<header>
  <a href="index.html" class="logo">AUDIOTOOL <span class="slash">//</span> FEATURED ARTISTS</a>
  <span class="header-count" id="headerCount"></span>
</header>

<div class="search-bar">
  <input class="search-input" id="searchInput" type="text" placeholder="Search artists..." oninput="doSearch()">
  <span class="search-count" id="searchCount"></span>
</div>

<div id="heroWrap" style="display:none" class="hero-wrap">
  <div class="hero-tag">▶ CURRENT FEATURED ARTIST</div>
  <div class="hero" id="heroContent"></div>
</div>

<div class="grid-section">
  <div class="grid-title" id="gridTitle">ALL ARTISTS</div>
  <div class="grid" id="artistGrid"></div>
  <div class="no-results" id="noResults">NO ARTISTS FOUND</div>
</div>

<script>
let allArtists = [], shuffled = [];

fetch('data.json')
  .then(r => r.json())
  .then(data => {
    allArtists = data;
    const current = data.find(a => a.is_current);
    shuffled = data.filter(a => !a.is_current).sort(() => Math.random() - .5);
    document.getElementById('headerCount').textContent = data.length + ' ARTISTS';
    document.getElementById('searchCount').textContent = shuffled.length + ' IN ARCHIVE';
    if(current){ renderHero(current); applyBgWash(current); }
    renderGrid(shuffled);
  });

function applyBgWash(a){
  const col = a.color1 || a.color_accent;
  if(!col || col.length < 7) return;
  const r=parseInt(col.slice(1,3),16), g=parseInt(col.slice(3,5),16), b=parseInt(col.slice(5,7),16);
  if(isNaN(r)) return;
  const wash = document.getElementById('bgWash');
  wash.style.background = `radial-gradient(ellipse 80% 60% at top left, rgba(${r},${g},${b},0.18) 0%, transparent 65%)`;
  wash.classList.add('on');
}

function renderHero(a){
  document.getElementById('heroWrap').style.display = 'block';
  const accent = a.color1 || a.color_accent || 'var(--accent)';
  const intro = (a.intro||'').replace(/</g,'&lt;');
  document.getElementById('heroContent').innerHTML = `
    <div>
      <div class="hero-name" style="color:${accent}">${a.artist}</div>
      ${a.real_name ? `<div class="hero-realname">${a.real_name}</div>` : ''}
      ${intro ? `<div class="hero-intro" style="border-left-color:${accent}">${intro}</div>` : ''}
      <a href="artist.html?id=${encodeURIComponent(a.artist)}" class="hero-cta" style="background:${accent}">READ MORE ↗</a>
    </div>
    <div class="hero-photo-col">
      ${a.photo ? `<img src="${a.photo}" class="hero-photo" style="object-position:${a.photo_position||'top'}" alt="${a.artist}" onerror="this.outerHTML='<div class=hero-photo-placeholder></div>'">`
                : '<div class="hero-photo-placeholder"></div>'}
      ${(()=>{
        const albumMatch=(a.album_url||'').match(/\/album\/([^/]+)/);
        const albumId=albumMatch?albumMatch[1]:null;
        const covUrl=a.cover_url||(albumId?`https://api.audiotool.com/album/${albumId}/cover/256.jpg`:'');
        return covUrl?`<img src="${covUrl}" style="position:absolute;bottom:36px;left:0;width:45%;max-width:160px;display:block;border:1px solid rgba(0,0,0,.3);z-index:1;" onerror="this.style.display='none'">`:'';
      })()}
      <div style="position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;background:${accent};color:#0e0e0e;padding:14px 12px;font-family:var(--block);font-size:12px;letter-spacing:.12em;z-index:2;">
        <span>FEATURED ARTIST</span>
        <span>${allArtists.indexOf(a)+107}</span>
      </div>
    </div>`;
}

function renderGrid(artists){
  const grid = document.getElementById('artistGrid');
  const noRes = document.getElementById('noResults');
  if(!artists.length){ grid.innerHTML=''; noRes.style.display='block'; return; }
  noRes.style.display = 'none';

  grid.innerHTML = artists.map((a, i) => {
    const accent = a.color1 || a.color_accent || '';
    const accentStyle = accent ? `style="--card-accent:${accent}"` : '';
    const intro = (a.intro||'').slice(0,120).replace(/</g,'&lt;') + ((a.intro||'').length>120?'…':'');
    const year = (a.date||'').slice(0,4);
    const origIdx = allArtists.indexOf(a);
    const num = origIdx >= 0 ? origIdx + 107 : '—';
    return `<a href="artist.html?id=${encodeURIComponent(a.artist)}" class="card" ${accentStyle}>
      <div class="card-inner">
        <div class="card-photo-wrap">
          ${a.photo
            ? `<img src="${a.photo}" class="card-photo" style="object-position:${a.photo_position||'top'}" alt="${a.artist}" loading="lazy" onerror="this.outerHTML='<div class=card-photo-placeholder></div>'">`
            : '<div class="card-photo-placeholder"></div>'}
          <div class="card-feat-label">
            <span>Featured Artist</span>
            <span>${num}</span>
          </div>

        </div>
        <div class="card-info">
          <div class="card-top">
            <div class="card-name">${a.artist}</div>
            ${a.real_name ? `<div class="card-real">${a.real_name}</div>` : ''}
          </div>
          <div>
            ${year ? `<div class="card-year">${year}</div>` : ''}
            ${intro ? `<div class="card-intro">${intro}</div>` : ''}
          </div>
        </div>
      </div>
      <div class="card-bar"></div>
    </a>`;
  }).join('');
}

function doSearch(){
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if(!q){
    document.getElementById('searchCount').textContent = shuffled.length + ' IN ARCHIVE';
    document.getElementById('gridTitle').textContent = 'ALL ARTISTS';
    renderGrid(shuffled);
    return;
  }
  const results = allArtists.filter(a =>
    a.artist.toLowerCase().includes(q) || (a.real_name||'').toLowerCase().includes(q)
  );
  document.getElementById('searchCount').textContent = results.length + ' RESULTS';
  document.getElementById('gridTitle').textContent = 'SEARCH RESULTS';
  renderGrid(results);
}
</script>
</body>
</html>
