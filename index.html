<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featured Artists — Audiotool</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e; --surface: #141414; --border: #222;
    --text: #e8e4dc; --text-dim: #888; --accent: #e8c840;
    --block: "Bebas Neue", Impact, sans-serif;
    --type: "Special Elite", serif;
    --max: 1400px; --pad: 40px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--type); min-height:100vh; overflow-x:hidden; }

  /* HEADER */
  header {
    border-bottom:2px solid var(--border); padding:0 var(--pad); height:50px;
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(14,14,14,.96); position:sticky; top:0; z-index:100;
  }
  .logo { font-family:var(--block); font-size:16px; letter-spacing:.15em; color:var(--text); text-decoration:none; }
  .logo .slash { color:var(--accent); }
  .header-count { font-family:var(--block); font-size:13px; letter-spacing:.1em; color:var(--text-dim); }

  /* SEARCH BAR */
  .search-bar {
    border-bottom:1px solid var(--border); padding:16px var(--pad);
    display:flex; align-items:center; gap:16px;
  }
  .search-input {
    background:var(--surface); border:1px solid var(--border); outline:none;
    color:var(--text); font-family:var(--type); font-size:14px; padding:10px 16px;
    width:320px; letter-spacing:.02em; transition:border-color .15s;
  }
  .search-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:var(--text-dim); }
  .search-count { font-family:var(--block); font-size:13px; letter-spacing:.1em; color:var(--text-dim); }

  /* CURRENT FEATURED HERO */
  .hero-section {
    border-bottom:2px solid var(--border); padding:60px var(--pad);
    max-width:var(--max); margin:0 auto;
    display:grid; grid-template-columns:1fr 1fr; gap:60px; align-items:center;
  }
  .hero-label {
    font-family:var(--block); font-size:12px; letter-spacing:.25em; color:var(--accent);
    margin-bottom:16px;
  }
  .hero-name {
    font-family:var(--block); font-size:clamp(64px, 8vw, 120px);
    line-height:.9; letter-spacing:.05em; color:var(--text); margin-bottom:20px;
  }
  .hero-intro {
    font-size:14px; line-height:1.8; color:var(--text-dim); max-width:500px;
    font-style:italic; border-left:2px solid var(--accent); padding-left:16px;
    margin-bottom:32px;
  }
  .hero-link {
    display:inline-block; font-family:var(--block); font-size:16px; letter-spacing:.15em;
    background:var(--accent); color:var(--bg); padding:12px 32px; text-decoration:none;
    transition:opacity .15s;
  }
  .hero-link:hover { opacity:.85; }
  .hero-photo-wrap { position:relative; }
  .hero-photo {
    width:100%; aspect-ratio:1; object-fit:cover; display:block;
    border:1px solid var(--border);
  }
  .hero-photo-label {
    position:absolute; bottom:0; left:0; right:0;
    background:rgba(14,14,14,.85); padding:12px 16px;
    font-family:var(--block); font-size:11px; letter-spacing:.2em; color:var(--text-dim);
  }

  /* GRID SECTION */
  .grid-section { max-width:var(--max); margin:0 auto; padding:40px var(--pad); }
  .grid-title {
    font-family:var(--block); font-size:14px; letter-spacing:.2em; color:var(--text-dim);
    margin-bottom:28px; text-transform:uppercase;
  }
  .grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
    gap:1px; background:var(--border);
  }

  /* CARD */
  .card {
    background:var(--bg); cursor:pointer; transition:background .15s;
    text-decoration:none; display:block; position:relative; overflow:hidden;
  }
  .card:hover { background:var(--surface); }
  .card:hover .card-name { color:var(--accent); }
  .card-photo {
    width:100%; aspect-ratio:1; object-fit:cover; display:block;
    filter:grayscale(20%); transition:filter .2s;
  }
  .card:hover .card-photo { filter:grayscale(0%); }
  .card-photo-placeholder {
    width:100%; aspect-ratio:1; background:var(--surface);
    display:flex; align-items:center; justify-content:center;
  }
  .card-info { padding:14px 16px 16px; }
  .card-name {
    font-family:var(--block); font-size:20px; letter-spacing:.08em;
    color:var(--text); transition:color .15s; line-height:1;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .card-real { font-size:11px; color:var(--text-dim); margin-top:4px; font-family:var(--type); }
  .card-date { font-size:10px; color:#444; margin-top:6px; font-family:var(--block); letter-spacing:.1em; }

  /* COLOR WASH ON CARD */
  .card-wash {
    position:absolute; top:0; left:0; right:0; height:4px;
    background:var(--c1, transparent);
  }

  /* NO RESULTS */
  .no-results {
    padding:60px; text-align:center; color:var(--text-dim);
    font-family:var(--block); font-size:20px; letter-spacing:.15em;
    display:none;
  }

  @media(max-width:768px){
    :root{--pad:20px;}
    .hero-section{grid-template-columns:1fr;gap:32px;}
    .hero-photo-wrap{order:-1;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));}
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">AUDIOTOOL <span class="slash">//</span> FEATURED ARTISTS</a>
  <span class="header-count" id="headerCount"></span>
</header>

<div class="search-bar">
  <input class="search-input" id="searchInput" type="text" placeholder="Search artists..." oninput="doSearch()">
  <span class="search-count" id="searchCount"></span>
</div>

<!-- CURRENT FEATURED HERO -->
<div id="heroSection" style="display:none">
  <div style="border-bottom:1px solid var(--border);background:var(--surface);padding:12px var(--pad);max-width:100%">
    <span style="font-family:var(--block);font-size:11px;letter-spacing:.2em;color:var(--accent)">▶ CURRENT FEATURED ARTIST</span>
  </div>
  <div class="hero-section" id="heroContent"></div>
</div>

<!-- GRID -->
<div class="grid-section">
  <div class="grid-title" id="gridTitle">ALL ARTISTS</div>
  <div class="grid" id="artistGrid"></div>
  <div class="no-results" id="noResults">NO ARTISTS FOUND</div>
</div>

<script>
let allArtists = [];
let shuffled = [];

fetch('data.json')
  .then(r => r.json())
  .then(data => {
    allArtists = data;

    // Find current featured
    const current = data.find(a => a.is_current);

    // Shuffle the rest
    const rest = current ? data.filter(a => !a.is_current) : [...data];
    shuffled = rest.sort(() => Math.random() - 0.5);

    document.getElementById('headerCount').textContent = data.length + ' ARTISTS';
    document.getElementById('searchCount').textContent = (current ? rest.length : data.length) + ' IN ARCHIVE';

    if(current) renderHero(current);
    renderGrid(shuffled);
  });

function renderHero(a){
  const heroSection = document.getElementById('heroSection');
  const heroContent = document.getElementById('heroContent');
  heroSection.style.display = 'block';

  const photo = a.photo || '';
  const intro = (a.intro || '').slice(0, 280) + ((a.intro||'').length > 280 ? '…' : '');
  const accentColor = a.color1 || a.color_accent || 'var(--accent)';

  heroContent.style.borderLeft = `4px solid ${accentColor}`;
  heroContent.innerHTML = `
    <div>
      <div class="hero-label" style="color:${accentColor}">FEATURED ARTIST</div>
      <div class="hero-name" style="color:${accentColor}">${a.artist}</div>
      ${a.real_name ? `<div style="font-family:var(--block);font-size:14px;letter-spacing:.15em;color:var(--text-dim);margin-bottom:20px">${a.real_name}</div>` : ''}
      ${intro ? `<div class="hero-intro">${intro}</div>` : ''}
      <a href="artist.html?id=${encodeURIComponent(a.artist)}" class="hero-link" style="background:${accentColor};color:#0e0e0e">READ MORE ↗</a>
    </div>
    <div class="hero-photo-wrap">
      ${photo
        ? `<img src="${photo}" class="hero-photo" alt="${a.artist}" onerror="this.parentElement.innerHTML='<div class=hero-photo-placeholder></div>'">`
        : '<div class="hero-photo-placeholder"></div>'}
      <div class="hero-photo-label">${a.artist.toUpperCase()}</div>
    </div>
  `;
}

function renderGrid(artists){
  const grid = document.getElementById('artistGrid');
  const noRes = document.getElementById('noResults');

  if(!artists.length){
    grid.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  grid.innerHTML = artists.map(a => {
    const photo = a.photo || '';
    const accentColor = a.color1 || a.color_accent || '';
    return `<a href="artist.html?id=${encodeURIComponent(a.artist)}" class="card">
      ${accentColor ? `<div class="card-wash" style="background:${accentColor}"></div>` : ''}
      ${photo
        ? `<img src="${photo}" class="card-photo" alt="${a.artist}" loading="lazy" onerror="this.parentElement.innerHTML+='<div class=card-photo-placeholder></div>';this.remove()">`
        : '<div class="card-photo-placeholder"></div>'}
      <div class="card-info">
        <div class="card-name">${a.artist}</div>
        ${a.real_name ? `<div class="card-real">${a.real_name}</div>` : ''}
        <div class="card-date">${(a.date||'').slice(0,4)}</div>
      </div>
    </a>`;
  }).join('');
}

function doSearch(){
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const gridTitle = document.getElementById('gridTitle');

  if(!q){
    document.getElementById('searchCount').textContent = shuffled.length + ' IN ARCHIVE';
    gridTitle.textContent = 'ALL ARTISTS';
    renderGrid(shuffled);
    return;
  }

  const results = allArtists.filter(a =>
    a.artist.toLowerCase().includes(q) ||
    (a.real_name||'').toLowerCase().includes(q)
  );

  document.getElementById('searchCount').textContent = results.length + ' RESULTS';
  gridTitle.textContent = 'SEARCH RESULTS';
  renderGrid(results);
}
</script>
</body>
</html>
