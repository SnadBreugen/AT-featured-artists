<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featured Artists — Audiotool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #161616;
    --border: #222222;
    --border-bright: #333333;
    --text: #e8e8e8;
    --text-muted: #666;
    --text-dim: #444;
    --accent: #ff4d00;
    --accent2: #ffb800;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── NOISE OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.025;
    pointer-events: none;
    z-index: 9999;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
    text-decoration: none;
  }

  .logo span { color: var(--accent); }

  .header-meta {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ── HERO ── */
  .hero {
    border-bottom: 1px solid var(--border);
    padding: 80px 40px 60px;
    position: relative;
    overflow: hidden;
  }

  .hero-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
    font-family: var(--mono);
  }

  .hero h1 {
    font-family: var(--sans);
    font-weight: 800;
    font-size: clamp(36px, 6vw, 80px);
    line-height: 0.95;
    letter-spacing: -0.02em;
    color: var(--text);
    max-width: 800px;
  }

  .hero h1 em {
    font-style: normal;
    color: var(--text-muted);
  }

  .hero-stats {
    margin-top: 40px;
    display: flex;
    gap: 40px;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .stat-num {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 28px;
    color: var(--text);
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    padding: 16px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-right: 4px;
  }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--text-muted);
    color: var(--text);
  }

  .filter-btn.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  /* ── GRID ── */
  .grid-container {
    padding: 40px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px;
    background: var(--border);
  }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    padding: 28px 24px;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    display: flex;
    flex-direction: column;
    min-height: 200px;
    text-decoration: none;
    color: inherit;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--card-color, transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover {
    background: var(--surface2);
  }

  .card:hover::before {
    opacity: 1;
  }

  .card-index {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
    font-family: var(--mono);
  }

  .card-name {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 20px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
    color: var(--text);
  }

  .card-realname {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 16px;
    letter-spacing: 0.03em;
  }

  .card-intro {
    font-size: 11px;
    line-height: 1.6;
    color: var(--text-muted);
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-date {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  .card-tracks {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .card-tracks span {
    color: var(--accent);
    font-weight: 700;
  }

  /* ── FEATURED CARD (large) ── */
  .card.featured {
    grid-column: span 2;
    min-height: 280px;
    padding: 40px 36px;
  }

  .card.featured .card-name {
    font-size: 32px;
  }

  .card.featured .card-intro {
    -webkit-line-clamp: 4;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 0;
  }

  .footer-text {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
  }

  .footer-link {
    font-size: 11px;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.08em;
    transition: color 0.15s;
  }

  .footer-link:hover { color: var(--text); }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative;
    margin-left: auto;
  }

  .search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 7px 32px 7px 12px;
    width: 200px;
    outline: none;
    transition: border-color 0.15s;
    letter-spacing: 0.05em;
  }

  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--border-bright); }

  /* ── SCROLL INDICATOR ── */
  .scroll-line {
    position: fixed;
    top: 0;
    left: 0;
    height: 2px;
    background: var(--accent);
    z-index: 9998;
    transition: width 0.1s linear;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    grid-column: 1 / -1;
    padding: 80px 40px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  @media (max-width: 768px) {
    header { padding: 0 20px; }
    .hero { padding: 60px 20px 40px; }
    .filter-bar { padding: 12px 20px; }
    .grid-container { padding: 20px; }
    .card.featured { grid-column: span 1; }
    footer { padding: 30px 20px; flex-direction: column; gap: 12px; text-align: center; }
  }
</style>
</head>
<body>

<div class="scroll-line" id="scrollLine"></div>

<header>
  <a href="index.html" class="logo">audiotool <span>//</span> featured artists</a>
  <span class="header-meta">Gen II — 2021–2026</span>
</header>

<section class="hero">
  <p class="hero-label">Archive</p>
  <h1>The artists who shaped<br><em>a community.</em></h1>
  <div class="hero-stats">
    <div class="stat">
      <span class="stat-num" id="statCount">—</span>
      <span class="stat-label">Featured Artists</span>
    </div>
    <div class="stat">
      <span class="stat-num">5</span>
      <span class="stat-label">Years</span>
    </div>
    <div class="stat">
      <span class="stat-num" id="statTracks">—</span>
      <span class="stat-label">Curated Tracks</span>
    </div>
  </div>
</section>

<div class="filter-bar">
  <span class="filter-label">Sort</span>
  <button class="filter-btn active" data-sort="date-asc">Oldest first</button>
  <button class="filter-btn" data-sort="date-desc">Newest first</button>
  <button class="filter-btn" data-sort="name">A–Z</button>
  <div class="search-wrap" style="margin-left:auto">
    <input type="text" class="search-input" id="searchInput" placeholder="Search artists…">
  </div>
</div>

<div class="grid-container">
  <div class="grid" id="grid">
    <div class="empty-state">Loading…</div>
  </div>
</div>

<footer>
  <span class="footer-text">Audiotool Featured Artists Archive</span>
  <a href="https://www.audiotool.com" class="footer-link" target="_blank">audiotool.com ↗</a>
</footer>

<script>
// ── PALETTE for card accents (cycling through artist index)
const PALETTE = [
  '#ff4d00','#ffb800','#00d4ff','#ff006e','#00ff88',
  '#8b5cf6','#f97316','#06b6d4','#84cc16','#ec4899'
];

let artists = [];
let currentSort = 'date-asc';
let currentSearch = '';

// ── LOAD DATA
fetch('data.json')
  .then(r => r.json())
  .then(data => {
    artists = data;
    updateStats();
    render();
  })
  .catch(() => {
    document.getElementById('grid').innerHTML =
      '<div class="empty-state">Could not load data.json</div>';
  });

function updateStats() {
  document.getElementById('statCount').textContent = artists.length;
  const totalTracks = artists.reduce((sum, a) => sum + (a.tracks?.length || 0), 0);
  document.getElementById('statTracks').textContent = totalTracks;
}

function getFiltered() {
  let list = [...artists];

  if (currentSearch) {
    const q = currentSearch.toLowerCase();
    list = list.filter(a =>
      a.artist.toLowerCase().includes(q) ||
      (a.real_name || '').toLowerCase().includes(q) ||
      (a.intro || '').toLowerCase().includes(q)
    );
  }

  if (currentSort === 'date-asc') list.sort((a,b) => a.date.localeCompare(b.date));
  else if (currentSort === 'date-desc') list.sort((a,b) => b.date.localeCompare(a.date));
  else if (currentSort === 'name') list.sort((a,b) => a.artist.localeCompare(b.artist));

  return list;
}

function formatDate(d) {
  const [y,m,day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${day}, ${y}`;
}

function getIndexInOriginal(artist) {
  return artists.findIndex(a => a.artist === artist.artist);
}

function render() {
  const list = getFiltered();
  const grid = document.getElementById('grid');

  if (!list.length) {
    grid.innerHTML = '<div class="empty-state">No artists found</div>';
    return;
  }

  grid.innerHTML = list.map((a, i) => {
    const origIndex = getIndexInOriginal(a);
    const color = PALETTE[origIndex % PALETTE.length];
    const isFeatured = i === 0 && !currentSearch;
    const trackCount = a.tracks?.length || 0;
    const shortName = a.real_name && a.real_name !== a.artist ? a.real_name : '';

    return `
      <a class="card${isFeatured ? ' featured' : ''}"
         href="artist.html?id=${encodeURIComponent(a.artist)}"
         style="--card-color: ${color}">
        <span class="card-index">${String(origIndex + 1).padStart(3,'0')}</span>
        <div class="card-name">${escHtml(a.artist)}</div>
        ${shortName ? `<div class="card-realname">${escHtml(shortName)}</div>` : ''}
        ${a.intro ? `<p class="card-intro">${escHtml(a.intro)}</p>` : ''}
        <div class="card-footer">
          <span class="card-date">${formatDate(a.date)}</span>
          ${trackCount ? `<span class="card-tracks"><span>${trackCount}</span> tracks</span>` : ''}
        </div>
      </a>
    `;
  }).join('');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── FILTERS
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    render();
  });
});

// ── SEARCH
document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value.trim();
  render();
});

// ── SCROLL PROGRESS
window.addEventListener('scroll', () => {
  const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
  document.getElementById('scrollLine').style.width = pct + '%';
});
</script>
</body>
</html>
