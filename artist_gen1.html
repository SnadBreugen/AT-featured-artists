<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featured Artist Gen I — Audiotool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e; --surface: #181818; --border: #2a2a2a;
    --text: #e8e4dc; --text-muted: #aaa49c; --text-dim: #555;
    --accent: #e8c840; --gen-color: #28E5FF;
    --block: 'Bebas Neue', Impact, sans-serif;
    --type: 'Special Elite', 'Courier New', monospace;
    --max: 1120px; --pad: clamp(20px, 4vw, 56px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: var(--type); min-height: 100vh; overflow-x: hidden; }

  #colorWash { position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0; transition: opacity 1.6s ease; }
  #colorWash.on { opacity: 1; }
  #washTop { position: absolute; top: 0; left: 0; right: 0; height: 45vh; transition: background 1.4s ease; }
  #washBot { position: absolute; bottom: 0; left: 0; right: 0; height: 40vh; transition: background 1.4s ease; }
  #washFade { position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 40%, transparent 30%, var(--bg) 80%); }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,14,14,0.95); backdrop-filter: blur(12px);
    border-bottom: 2px solid var(--border); height: 50px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 var(--pad);
  }
  .logo { font-family: var(--block); font-size: 16px; letter-spacing: 0.15em; color: var(--text-muted); text-decoration: none; transition: color .15s; }
  .logo:hover { color: var(--text); }
  .logo .slash { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 20px; }
  .back { font-family: var(--type); font-size: 11px; color: var(--gen-color); text-decoration: none; letter-spacing: 0.1em; text-transform: uppercase; transition: opacity .15s; opacity: .7; }
  .back:hover { opacity: 1; }

  .hero {
    position: relative; z-index: 1; max-width: var(--max); margin: 0 auto;
    padding: clamp(36px,5vw,72px) var(--pad) 0;
    display: grid; grid-template-columns: 1fr auto; gap: 40px; align-items: start;
  }
  .hero-num { font-family: var(--block); font-size: 13px; letter-spacing: 0.25em; color: var(--accent); margin-bottom: 10px; }
  .hero-name { font-family: var(--block); font-size: clamp(48px, 8vw, 120px); line-height: 0.88; letter-spacing: 0.02em; color: var(--text); text-transform: uppercase; margin-bottom: 14px; word-break: break-word; }
  .hero-realname { font-family: var(--type); font-size: 13px; color: var(--text-muted); letter-spacing: 0.05em; margin-bottom: 24px; }
  .hero-intro { font-family: var(--type); font-size: 14px; line-height: 1.85; color: var(--text-muted); max-width: 520px; border-left: 3px solid var(--accent); padding-left: 18px; }

  .hero-photo { flex-shrink: 0; }
  .cover-wrap {
    width: clamp(200px, 26vw, 340px);
    position: relative; border: 2px solid var(--border); overflow: hidden;
  }
  .cover-wrap img {
    width: 100%; aspect-ratio: 1; object-fit: cover; object-position: center;
    display: block; filter: grayscale(10%); transition: filter .4s;
  }
  .cover-wrap img:hover { filter: grayscale(0%); }
  .cover-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--bar-color, #111);
  }
  .cover-bar .bar-num {
    font-family: var(--block); font-size: 18px; letter-spacing: .04em;
    color: var(--bar-text, #fff); line-height: 1;
  }
  .cover-bar .bar-name {
    font-family: var(--block); font-size: 18px; letter-spacing: .06em;
    color: var(--bar-text, #fff); text-align: right;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 65%;
  }
  .cover-date { font-size: 10px; color: var(--text-dim); letter-spacing: 0.1em; margin-top: 8px; text-align: right; font-family: var(--type); }

  .links-bar {
    position: relative; z-index: 1; max-width: var(--max); margin: 28px auto 0;
    padding: 14px var(--pad); border-top: 1px solid var(--border); border-bottom: 2px solid var(--border);
    display: flex; gap: 28px; flex-wrap: wrap;
  }
  .ext-link { font-family: var(--type); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--links-bar-color, var(--text-dim)); text-decoration: none; transition: color .15s; display: flex; align-items: center; gap: 5px; }
  .ext-link::before { content: '↗'; color: var(--links-bar-color, var(--accent)); }
  .ext-link:hover { color: var(--text); }

  .main { position: relative; z-index: 1; max-width: var(--max); margin: 0 auto; padding: 0 var(--pad); display: grid; grid-template-columns: 1fr 300px; }
  .interview { padding: 52px 48px 80px 0; border-right: 1px solid var(--border); }
  .sec-title { font-family: var(--block); font-size: 28px; letter-spacing: 0.12em; color: var(--accent); margin-bottom: 28px; text-transform: uppercase; padding-bottom: 10px; border-bottom: 2px solid var(--accent); display: inline-block; }
  .about-block { margin-bottom: 48px; }
  .about-text { font-family: var(--type); font-size: 14px; line-height: 1.9; color: var(--text-muted); }
  .qa-list { display: flex; flex-direction: column; gap: 40px; }
  .qa-q { font-family: var(--block); font-size: 20px; letter-spacing: 0.06em; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; line-height: 1.2; }
  .qa-a { font-family: var(--type); font-size: 14px; line-height: 1.95; color: var(--text-muted); }

  .sidebar { padding: 52px 0 80px 36px; display: flex; flex-direction: column; gap: 40px; }
  .sidebar-title { font-family: var(--block); font-size: 22px; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase; padding-bottom: 8px; border-bottom: 2px solid var(--accent); }
  .track-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); margin-top: 1px; }
  .track-item { border-bottom: 1px solid var(--border); }
  .track-btn { background: var(--surface); padding: 10px 12px; display: flex; flex-direction: row; align-items: center; gap: 10px; cursor: pointer; transition: background .15s; border: none; width: 100%; text-align: left; color: inherit; font-family: var(--type); min-width: 0; }
  .track-btn:hover { background: #1e1e1e; }
  .track-btn.active { background: #1e1e1e; }
  .track-cover { width: 32px; height: 32px; flex-shrink: 0; object-fit: cover; display: block; border: 1px solid var(--border); background: var(--surface); }
  .tt { flex: 1; font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: .02em; min-width: 0; }
  .track-btn.active .tt { color: var(--text); }
  .tp { font-size: 9px; color: var(--text-dim); flex-shrink: 0; }
  .track-btn.active .tp { color: var(--accent); }
  .track-desc { display: none; padding: 10px 12px 12px 54px; font-size: 11px; line-height: 1.7; color: #1a1a1a; font-family: var(--type); background: var(--desc-bg, #e8e4dc); border-top: 1px solid var(--border); }
  .track-desc.open { display: block; }
  .play-toggle { width: 100%; background: var(--surface); border: 2px solid var(--accent); color: var(--accent); font-family: var(--block); font-size: 18px; letter-spacing: 0.15em; padding: 14px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: background .15s, color .15s; text-transform: uppercase; margin-top: 12px; }
  .play-toggle:hover { background: var(--accent); color: var(--bg); }
  .album-player { margin-top: 1px; }

  .nav { position: relative; z-index: 1; border-top: 2px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; }
  .nav-a { padding: 28px var(--pad); text-decoration: none; color: var(--text-dim); transition: background .15s, color .15s; display: flex; flex-direction: column; gap: 6px; }
  .nav-a:hover { background: var(--surface); color: var(--text); }
  .nav-a + .nav-a { border-left: 1px solid var(--border); text-align: right; align-items: flex-end; }
  .nav-dir { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--text-dim); }
  .nav-name { font-family: var(--block); font-size: 24px; letter-spacing: .05em; text-transform: uppercase; color: var(--text); }

  @media (max-width: 900px) { .hero { grid-template-columns: 1fr; gap: 24px; } .cover-wrap { width: 180px; } .cover-date { text-align: left; } .main { grid-template-columns: 1fr; } .interview { border-right: none; border-bottom: 1px solid var(--border); padding-right: 0; } .sidebar { padding-left: 0; } }
  @media (max-width: 600px) { .hero-name { font-size: 58px; } }
</style>
</head>
<body>

<div id="colorWash"><div id="washTop"></div><div id="washBot"></div><div id="washFade"></div></div>

<header>
  <a href="index.html" class="logo">AUDIOTOOL <span class="slash">//</span> FEATURED ARTISTS</a>
  <div class="header-right">
    <a href="generation1.html" class="back">GEN I Archive</a>
    <button id="autoplayToggle" onclick="window.toggleAutoplay()" style="background:var(--accent);border:2px solid #0e0e0e;color:#0e0e0e;font-family:var(--block);font-size:13px;letter-spacing:.15em;padding:6px 16px;cursor:pointer;transition:all .2s;">MUSIC AUTOPLAY: OFF</button>
  </div>
</header>

<div id="app"></div>

<script>
const params = new URLSearchParams(location.search);
const artistId = params.get('id');
let autoplay = localStorage.getItem('musicAutoplay') === 'true';
let albumOpen = false, currentTrackIdx = -1;
window._tracks = [];

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(d){ if(!d)return''; const [y,m,day]=d.split('-'); return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+' '+parseInt(day)+', '+y; }
function tId(url){ const m=url.match(/\/track\/([^/]+)/); return m?m[1]:''; }
function padNum(n){ return String(n).padStart(3,'0'); }

function applyColors(t,b){
  if(!t)return;
  document.getElementById('washTop').style.background=`linear-gradient(to bottom,rgba(${Math.round(t[0])},${Math.round(t[1])},${Math.round(t[2])},0.55) 0%,transparent 100%)`;
  document.getElementById('washBot').style.background=`linear-gradient(to top,rgba(${Math.round(b[0])},${Math.round(b[1])},${Math.round(b[2])},0.50) 0%,transparent 100%)`;
  document.getElementById('colorWash').classList.add('on');
}

function loadTrack(idx){
  const tracks=window._tracks;
  if(!tracks||!tracks.length)return;
  if(idx<0)idx=tracks.length-1;
  if(idx>=tracks.length)idx=0;
  currentTrackIdx=idx;
  const t=tracks[idx];
  const m=t.url.match(/\/track\/([^/]+)/);
  if(!m)return;
  const player=document.getElementById('albumPlayer');
  if(!player)return;
  document.querySelectorAll('.track-btn').forEach((b,i)=>{ b.classList.toggle('active',i===idx); const tp=b.querySelector('.tp'); if(tp)tp.textContent=i===idx?'▶':'▷'; });
  const trackId=m[1].replace(/\/$/,'');
  player.innerHTML=`<div style="background:var(--surface);border:1px solid var(--border);padding:12px"><div style="font-size:10px;color:var(--accent);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.06em;font-family:var(--block)">${esc(t.track_artist||'')} . ${esc(t.name||trackId)}</div><audio controls preload="none" style="width:100%;height:32px;display:block" onended="loadTrack(${idx+1})" onerror="this.insertAdjacentHTML('afterend','<div style=padding:4px;font-size:10px;color:var(--text-dim)>Stream not available</div>')"><source src="https://api.audiotool.com/track/${trackId}/play.mp3" type="audio/mpeg"></audio><div style="display:flex;justify-content:space-between;margin-top:8px"><button onclick="loadTrack(${idx}-1)" style="background:none;border:1px solid var(--border);color:var(--accent);cursor:pointer;font-family:var(--block);font-size:12px;letter-spacing:.1em;padding:3px 10px">PREV</button><span style="font-size:10px;color:var(--text-dim);letter-spacing:.08em;align-self:center">${idx+1} / ${tracks.length}</span><button onclick="loadTrack(${idx}+1)" style="background:none;border:1px solid var(--border);color:var(--accent);cursor:pointer;font-family:var(--block);font-size:12px;letter-spacing:.1em;padding:3px 10px">NEXT</button></div></div>`;
  setTimeout(()=>{ const a=player.querySelector('audio'); if(a)a.play().catch(()=>{}); },50);
}

window.toggleDesc=function(idx){ const popup=document.getElementById('tdesc-'+idx); if(!popup)return; document.querySelectorAll('.track-desc').forEach((p,i)=>{if(i!==idx)p.classList.remove('open');}); popup.classList.toggle('open'); };
window.playTrack=function(idx){ if(!albumOpen){albumOpen=true;const icon=document.getElementById('playIcon');const label=document.getElementById('playLabel');if(icon)icon.textContent='■';if(label)label.textContent='STOP';} loadTrack(idx); };
window.toggleAlbum=function(){ const player=document.getElementById('albumPlayer');const icon=document.getElementById('playIcon');const label=document.getElementById('playLabel');albumOpen=!albumOpen;if(albumOpen){loadTrack(0);if(icon)icon.textContent='■';if(label)label.textContent='STOP';}else{if(player)player.innerHTML='';currentTrackIdx=-1;if(icon)icon.textContent='▶';if(label)label.textContent='PLAY TRACKS';} };
window.toggleAutoplay=function(){ autoplay=!autoplay;localStorage.setItem('musicAutoplay',autoplay);updateAutoplayBtn();if(!autoplay){const player=document.getElementById('albumPlayer');if(player)player.innerHTML='';}};

function updateAutoplayBtn(){
  const btn=document.getElementById('autoplayToggle');
  if(!btn)return;
  if(autoplay){btn.textContent='MUSIC AUTOPLAY: ON';btn.style.background='transparent';btn.style.color='var(--accent)';btn.style.borderColor='var(--accent)';}
  else{btn.textContent='MUSIC AUTOPLAY: OFF';btn.style.background='var(--accent)';btn.style.color='#0e0e0e';btn.style.borderColor='#0e0e0e';}
}

fetch('gen1_data.json')
  .then(r=>r.json())
  .then(data=>{
    if(!artistId){location.href='generation1.html';return;}
    const idx=data.findIndex(a=>a.artist===artistId);
    if(idx===-1){location.href='generation1.html';return;}
    if(data[idx].is_hidden){document.getElementById('app').innerHTML='<div style="padding:60px;font-family:var(--block);font-size:24px;color:var(--text-dim);letter-spacing:.1em">ARTIST NOT AVAILABLE</div>';return;}
    const visible=data.filter(a=>!a.is_hidden);
    const vIdx=visible.indexOf(data[idx]);
    render(data[idx],vIdx>0?visible[vIdx-1]:null,vIdx<visible.length-1?visible[vIdx+1]:null);
  })
  .catch(()=>{document.getElementById('app').innerHTML='<div style="padding:60px;font-family:var(--block);font-size:24px;color:var(--text-dim);letter-spacing:.1em">DATA NOT FOUND</div>';});

function render(a,prev,next){
  document.title=`${a.artist} . Gen I . Audiotool Featured Artist`;
  const barColor = a.bar_color || a.color1 || '#111111';
  const barText = a.bar_text_color || '#ffffff';
  const tracks=(a.tracks||[]).filter(t=>t.name&&t.track_artist&&t.url&&t.url.includes('/track/'));
  window._tracks=tracks;
  const accent=a.color_accent||a.color1||'var(--accent)';

  document.getElementById('app').innerHTML=`
    <section class="hero">
      <div class="hero-left">
        <div class="hero-num" style="color:${accent}">FEATURED ARTIST ${padNum(a.album_number)} . GEN I</div>
        <h1 class="hero-name" style="color:${accent}">${esc(a.artist)}</h1>
        ${a.real_name&&a.real_name!==a.artist?`<div class="hero-realname">${esc(a.real_name)}</div>`:''}
        ${a.intro?`<p class="hero-intro" style="border-left-color:${accent}">${esc(a.intro)}</p>`:''}
      </div>
      <div class="hero-photo">
        <div class="cover-wrap">
          ${a.photo
            ? `<img src="${esc(a.photo)}" alt="${esc(a.artist)}" style="object-position:${a.photo_position||'center'}" onerror="this.style.display='none'">`
            : `<div style="width:100%;aspect-ratio:1;background:var(--surface);"></div>`}
          <div class="cover-bar" style="--bar-color:${barColor};--bar-text:${barText}">
            <span class="bar-num">${padNum(a.album_number)}</span>
            <span class="bar-name">${esc(a.artist)}</span>
          </div>
        </div>
        ${a.date?`<div class="cover-date">${fmtDate(a.date)}</div>`:''}
      </div>
    </section>

    <div class="links-bar">
      ${a.at_profile?`<a href="${esc(a.at_profile)}" target="_blank" class="ext-link">Audiotool</a>`:''}
      ${a.social&&a.social.soundcloud?`<a href="${esc(a.social.soundcloud)}" target="_blank" class="ext-link">SoundCloud</a>`:''}
      ${a.social&&a.social.spotify?`<a href="${esc(a.social.spotify)}" target="_blank" class="ext-link">Spotify</a>`:''}
      ${a.social&&a.social.instagram?`<a href="${esc(a.social.instagram)}" target="_blank" class="ext-link">Instagram</a>`:''}
      ${a.social&&a.social.youtube?`<a href="${esc(a.social.youtube)}" target="_blank" class="ext-link">YouTube</a>`:''}
      ${a.social&&a.social.bandcamp?`<a href="${esc(a.social.bandcamp)}" target="_blank" class="ext-link">Bandcamp</a>`:''}
      ${a.album_url?`<a href="${esc(a.album_url)}" target="_blank" class="ext-link">Edition Album</a>`:''}
    </div>

    <div class="main">
      <div class="interview">
        ${(a.about||a.interview&&a.interview.length)?`
          <div class="sec-title" style="color:${accent};border-bottom-color:${accent}">Interview</div>
          ${a.about?`<div class="about-block"><p class="about-text">${esc(a.about)}</p></div>`:''}
          ${a.interview&&a.interview.length?`<div class="qa-list">${a.interview.map(qa=>`<div class="qa-item"><div class="qa-q" style="color:${accent}">${esc(qa.q)}</div><div class="qa-a">${esc(qa.a)}</div></div>`).join('')}</div>`:''}
        `:'<div style="padding:52px 0;font-family:var(--block);font-size:16px;color:var(--text-dim);letter-spacing:.1em">NO INTERVIEW DATA</div>'}
      </div>
      <div class="sidebar">
        ${tracks.length?`
          <div>
            <button class="play-toggle" id="playToggle" onclick="toggleAlbum()" style="border-color:${accent};color:${accent}">
              <span id="playIcon">▶</span><span id="playLabel">PLAY TRACKS</span>
            </button>
            <div class="album-player" id="albumPlayer"></div>
          </div>
          <div>
            <div class="sidebar-title" style="color:${accent};border-bottom-color:${accent}">Curated Tracks</div>
            <div class="track-list">
              ${tracks.map((t,i)=>`
                <div class="track-item">
                  <button class="track-btn" onclick="toggleDesc(${i});playTrack(${i})">
                    <img class="track-cover" src="https://api.audiotool.com/track/${tId(t.url)}/cover/256.jpg" onerror="this.style.background='var(--surface)';this.removeAttribute('src')" alt="">
                    <span class="tt">${esc(t.track_artist)} . ${esc(t.name)}</span>
                    <span class="tp" id="tp-${i}">▷</span>
                  </button>
                  ${t.desc?`<div class="track-desc" id="tdesc-${i}">${esc(t.desc)}</div>`:''}
                </div>
              `).join('')}
            </div>
          </div>
        `:`<div style="font-family:var(--block);font-size:14px;color:var(--text-dim);letter-spacing:.1em">NO TRACK DATA</div>`}
      </div>
    </div>

    <nav class="nav">
      ${prev?`<a href="artist_gen1.html?id=${encodeURIComponent(prev.artist)}" class="nav-a"><span class="nav-dir">Previous</span><span class="nav-name">${esc(prev.artist)}</span></a>`:`<span class="nav-a" style="opacity:.25"><span class="nav-dir">Start of archive</span></span>`}
      ${next?`<a href="artist_gen1.html?id=${encodeURIComponent(next.artist)}" class="nav-a" style="text-align:right;align-items:flex-end"><span class="nav-dir">Next</span><span class="nav-name">${esc(next.artist)}</span></a>`:`<span class="nav-a" style="opacity:.25;text-align:right;align-items:flex-end"><span class="nav-dir">End of archive</span></span>`}
    </nav>
  `;

  updateAutoplayBtn();
  if(a.desc_bg)document.documentElement.style.setProperty('--desc-bg',a.desc_bg);
  if(a.links_bar_color)document.documentElement.style.setProperty('--links-bar-color',a.links_bar_color);
  if(a.color1){
    const h=s=>{const r=parseInt(s.slice(1,3),16),g=parseInt(s.slice(3,5),16),b=parseInt(s.slice(5,7),16);return[r,g,b];};
    try{applyColors(h(a.color1),h(a.color2||a.color1));}catch(e){}
  }
  if(tracks.length&&autoplay)setTimeout(()=>{window.toggleAlbum();},800);
}
</script>
</body>
</html>
