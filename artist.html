<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featured Artist — Audiotool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #181818;
    --border: #2a2a2a;
    --text: #e8e4dc;
    --text-muted: #aaa49c;
    --text-dim: #555;
    --accent: #e8c840;
    --accent2: #c8a830;
    --block: 'Bebas Neue', Impact, sans-serif;
    --type: 'Special Elite', 'Courier New', monospace;
    --max: 1120px;
    --pad: clamp(20px, 4vw, 56px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--type);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── COLOR WASH ── */
  #colorWash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    transition: opacity 1.6s ease;
  }
  #colorWash.on { opacity: 1; }
  #washTop {
    position: absolute;
    top: 0; left: 0; right: 0; height: 45vh;
    transition: background 1.4s ease;
  }
  #washBot {
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 40vh;
    transition: background 1.4s ease;
  }
  #washFade {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 40%, transparent 30%, var(--bg) 80%);
  }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(14,14,14,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 2px solid var(--border);
    height: 50px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 var(--pad);
  }
  .logo {
    font-family: var(--block);
    font-size: 16px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-decoration: none;
    transition: color .15s;
  }
  .logo:hover { color: var(--text); }
  .logo .slash { color: var(--accent); }
  .back {
    font-family: var(--type);
    font-size: 11px;
    color: var(--text-dim);
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color .15s;
  }
  .back:hover { color: var(--text); }

  /* ── HERO ── */
  .hero {
    position: relative; z-index: 1;
    max-width: var(--max);
    margin: 0 auto;
    padding: clamp(36px,5vw,72px) var(--pad) 0;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 40px;
    align-items: start;
  }
  .hero-num {
    font-family: var(--block);
    font-size: 13px;
    letter-spacing: 0.25em;
    color: var(--accent);
    margin-bottom: 10px;
  }
  .hero-name {
    font-family: var(--block);
    font-size: clamp(64px, 10vw, 128px);
    line-height: 0.88;
    letter-spacing: 0.02em;
    color: var(--text);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .hero-realname {
    font-family: var(--type);
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-bottom: 24px;
  }
  .hero-intro {
    font-family: var(--type);
    font-size: 14px;
    line-height: 1.85;
    color: var(--text-muted);
    max-width: 520px;
    border-left: 3px solid var(--accent);
    padding-left: 18px;
  }

  /* ── PHOTO ── */
  .hero-photo { flex-shrink: 0; }
  .photo-box {
    width: clamp(220px, 28vw, 360px);
    aspect-ratio: 1;
    overflow: hidden;
    border: 2px solid var(--border);
  }
  .photo-box img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
    filter: grayscale(15%);
    transition: filter .4s;
  }
  .photo-box img:hover { filter: grayscale(0%); }
  .photo-date {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    margin-top: 8px;
    text-align: right;
    font-family: var(--type);
  }

  /* ── LINKS BAR ── */
  .links-bar {
    position: relative; z-index: 1;
    max-width: var(--max); margin: 28px auto 0;
    padding: 14px var(--pad);
    border-top: 1px solid var(--border);
    border-bottom: 2px solid var(--border);
    display: flex; gap: 28px; flex-wrap: wrap;
    background: var(--links-bar-bg, transparent);
  }
  .ext-link {
    font-family: var(--type);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
    transition: color .15s;
    display: flex; align-items: center; gap: 5px;
  }
  .ext-link::before { content: '↗'; color: var(--accent); }
  .ext-link:hover { color: var(--text); }

  /* ── MAIN GRID ── */
  .main {
    position: relative; z-index: 1;
    max-width: var(--max); margin: 0 auto;
    padding: 0 var(--pad);
    display: grid;
    grid-template-columns: 1fr 300px;
  }

  /* ── INTERVIEW ── */
  .interview {
    padding: 52px 48px 80px 0;
    border-right: 1px solid var(--border);
  }

  .sec-title {
    font-family: var(--block);
    font-size: 28px;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 28px;
    text-transform: uppercase;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--accent);
    display: inline-block;
  }

  .about-block { margin-bottom: 48px; }
  .about-text {
    font-family: var(--type);
    font-size: 14px;
    line-height: 1.9;
    color: var(--text-muted);
  }

  .qa-list { display: flex; flex-direction: column; gap: 40px; }

  .qa-q {
    font-family: var(--block);
    font-size: 20px;
    letter-spacing: 0.06em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    line-height: 1.2;
  }
  .qa-a {
    font-family: var(--type);
    font-size: 14px;
    line-height: 1.95;
    color: var(--text-muted);
  }

  .board-link {
    margin-top: 52px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-family: var(--type);
    font-size: 11px;
  }
  .board-link a {
    color: var(--text-dim);
    text-decoration: underline;
    text-underline-offset: 3px;
    letter-spacing: 0.06em;
    transition: color .15s;
  }
  .board-link a:hover { color: var(--text-muted); }

  /* ── SIDEBAR ── */
  .sidebar {
    padding: 52px 0 80px 36px;
    display: flex; flex-direction: column; gap: 40px;
  }

  /* ── ALBUM COVER ── */
  .cover-link {
    display: block;
    position: relative;
    border: 2px solid var(--border);
    overflow: hidden;
    transition: border-color .2s;
  }
  .cover-link:hover { border-color: var(--accent); }
  .cover-link img {
    width: 100%; display: block;
  }
  .cover-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .2s;
    font-family: var(--block);
    font-size: 14px;
    letter-spacing: 0.15em;
    color: var(--text);
    text-transform: uppercase;
  }
  .cover-link:hover .cover-overlay { opacity: 1; }

  /* ── TRACKS ── */
  .sidebar-title {
    font-family: var(--block);
    font-size: 22px;
    letter-spacing: 0.1em;
    color: var(--accent);
    text-transform: uppercase;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--accent);
    margin-bottom: 0;
  }

  .track-list {
    display: flex; flex-direction: column;
    gap: 1px; background: var(--border);
    margin-top: 1px;
  }
  .track-btn {
    background: var(--surface);
    padding: 10px 14px;
    display: grid;
    grid-template-columns: 36px 1fr 18px;
    min-height: 52px;
    gap: 8px; align-items: center;
    cursor: pointer;
    transition: background .15s;
    border: none; width: 100%;
    text-align: left; color: inherit;
    font-family: var(--type);
  }
  .track-btn:hover { background: #202020; }
  .track-btn.active { background: #1e1e1e; }
  .track-btn.active .tn { color: var(--accent); }
  .track-btn.active .tt { color: var(--text); }
  .track-btn.active .tp { color: var(--accent); }

  .track-cover {
    width: 32px; height: 32px; object-fit: cover; display: block;
    border: 1px solid var(--border); flex-shrink: 0;
    background: var(--surface);
  }
  .track-item { border-bottom: 1px solid var(--border); }
  .track-btn {
    background: var(--surface);
    padding: 10px 12px;
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: background .15s;
    border: none; width: 100%;
    text-align: left; color: inherit;
    font-family: var(--type);
    min-width: 0;
  }
  .track-btn:hover { background: #1e1e1e; }
  .track-btn.active { background: #1e1e1e; }
  .track-cover {
    width: 32px; height: 32px; flex-shrink: 0;
    object-fit: cover; display: block;
    border: 1px solid var(--border);
  }
  .tt {
    flex: 1;
    font-size: 11px; color: var(--text-muted);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: .02em; min-width: 0;
  }
  .track-btn.active .tt { color: var(--text); }
  .tp { font-size: 9px; color: var(--text-dim); flex-shrink: 0; }
  .track-btn.active .tp { color: var(--accent); }
  .track-desc {
    display: none;
    padding: 10px 12px 12px 54px;
    font-size: 11px; line-height: 1.7;
    color: #1a1a1a;
    font-family: var(--type);
    background: var(--desc-bg, #e8e4dc);
    border-top: 1px solid var(--border);
  }
  .track-desc.open { display: block; }

  .play-toggle {
    width: 100%;
    background: var(--surface);
    border: 2px solid var(--accent);
    color: var(--accent);
    font-family: var(--block);
    font-size: 18px;
    letter-spacing: 0.15em;
    padding: 14px 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: background .15s, color .15s;
    text-transform: uppercase;
    margin-top: 12px;
  }
  .play-toggle:hover { background: var(--accent); color: var(--bg); }
  .album-player { margin-top: 1px; }
  audio::-webkit-media-controls-overflow-button { display: none !important; }
  audio::-webkit-media-controls-download-button { display: none !important; }
  audio { --media-controls-overflow-menu-button: none; }

  /* ── NAV ── */
  .nav {
    position: relative; z-index: 1;
    border-top: 2px solid var(--border);
    display: grid; grid-template-columns: 1fr 1fr;
  }
  .nav-a {
    padding: 28px var(--pad);
    text-decoration: none; color: var(--text-dim);
    transition: background .15s, color .15s;
    display: flex; flex-direction: column; gap: 6px;
  }
  .nav-a:hover { background: var(--surface); color: var(--text); }
  .nav-a + .nav-a { border-left: 1px solid var(--border); text-align: right; align-items: flex-end; }
  .nav-dir { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--text-dim); }
  .nav-name {
    font-family: var(--block);
    font-size: 24px; letter-spacing: .05em;
    text-transform: uppercase; color: var(--text);
  }

  @media (max-width: 900px) {
    .hero { grid-template-columns: 1fr; gap: 24px; }
    .photo-box { width: 150px; }
    .photo-date { text-align: left; }
    .main { grid-template-columns: 1fr; }
    .interview { border-right: none; border-bottom: 1px solid var(--border); padding-right: 0; }
    .sidebar { padding-left: 0; }
  }
  @media (max-width: 600px) {
    .hero-name { font-size: 58px; }
  }
</style>
</head>
<body>

<div id="colorWash">
  <div id="washTop"></div>
  <div id="washBot"></div>
  <div id="washFade"></div>
</div>

<header>
  <a href="index.html" class="logo">AUDIOTOOL <span class="slash">//</span> FEATURED ARTISTS</a>
  <div style="display:flex;align-items:center;gap:20px">
    <span style="font-size:10px;color:var(--text-dim);letter-spacing:.1em;font-family:var(--mono)">v0.6.9</span>
    <a href="index.html" class="back">← All artists</a>
  </div>
</header>

<div id="app"></div>

<script>
const params = new URLSearchParams(location.search);
const artistId = params.get('id');
let curUrl = null;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmtDate(d){
  if(!d) return '';
  const [y,m,day]=d.split('-');
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]+' '+parseInt(day)+', '+y;
}

function tId(url){
  const m=url.match(/\/track\/([^/]+)/);
  return m?m[1]:'';
}
function tSlug(url, desc, name){
  // Skip if name is a pure hash ID
  const isHash = name && /^[a-z0-9]{8,}$/.test(name) && !/[_\s-]/.test(name);
  if(name && name.length > 0 && !isHash) return name;
  // Fall back to URL slug if readable
  const m=url.match(/\/track\/([^/]+)/);
  if(m){
    const slug = m[1];
    if(!/^[a-z0-9]{8,}$/.test(slug)){
      return slug.replace(/_/g,' ').replace(/-[a-z0-9]{6,}$/,'').replace(/-/g,' ');
    }
  }
  return '—';
}

function extractColors(src, cb){
  // Try direct first, then via CORS proxy
  function tryLoad(url, onSuccess, onFail){
    const img=new Image();
    img.crossOrigin='anonymous';
    img.onload=()=>{
      try{
        const c=document.createElement('canvas');
        c.width=img.width; c.height=img.height;
        const ctx=c.getContext('2d');
        ctx.drawImage(img,0,0);
        function avg(d){ let r=0,g=0,b=0,n=0; for(let i=0;i<d.length;i+=4){r+=d[i];g+=d[i+1];b+=d[i+2];n++;} return [r/n,g/n,b/n]; }
        const t=avg(ctx.getImageData(4,4,80,80).data);
        const b=avg(ctx.getImageData(4,img.height-84,80,80).data);
        onSuccess(t,b);
      }catch(e){ onFail(); }
    };
    img.onerror=onFail;
    img.src=url;
  }
  // Try direct
  tryLoad(src,
    (t,b)=>cb(t,b),
    ()=>{
      // Try CORS proxy
      const proxy='https://corsproxy.io/?'+encodeURIComponent(src);
      tryLoad(proxy,
        (t,b)=>cb(t,b),
        ()=>cb(null,null)
      );
    }
  );
}

function applyColors(t,b){
  if(!t) return;
  const tc=`rgba(${Math.round(t[0])},${Math.round(t[1])},${Math.round(t[2])},0.45)`;
  const bc=`rgba(${Math.round(b[0])},${Math.round(b[1])},${Math.round(b[2])},0.40)`;
  // Accent = exact color1 as chosen
  const accent=`rgb(${Math.round(t[0])},${Math.round(t[1])},${Math.round(t[2])})`;
  document.documentElement.style.setProperty('--accent', accent);
  document.getElementById('washTop').style.background=`linear-gradient(to bottom, ${tc} 0%, transparent 100%)`;
  document.getElementById('washBot').style.background=`linear-gradient(to top, ${bc} 0%, transparent 100%)`;
  document.getElementById('colorWash').classList.add('on');
}

let albumOpen=false;
let currentTrackIdx=-1;
window._tracks=[];

function loadTrack(idx){
  const tracks=window._tracks;
  if(!tracks||!tracks.length) return;
  if(idx<0) idx=tracks.length-1;
  if(idx>=tracks.length) idx=0;
  currentTrackIdx=idx;
  const t=tracks[idx];
  const m=t.url.match(/\/track\/([^/]+)/);
  if(!m) return;
  const player=document.getElementById('albumPlayer');
  if(!player) return;
  // Highlight active track
  document.querySelectorAll('.track-btn').forEach((b,i)=>{
    b.classList.toggle('active',i===idx);
    b.querySelector('.tp').textContent=i===idx?'▶':'▷';
  });
  const trackId=m[1].replace(/\/$/,'');
  const mp3=`https://api.audiotool.com/track/${trackId}/play.mp3`;
  player.innerHTML=`
    <div style="background:var(--surface);border:1px solid var(--border);padding:12px">
      <div style="font-size:10px;color:var(--accent);margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.06em;font-family:var(--block)">
        ${t.track_artist||''} — ${t.name||trackId}
      </div>
      <audio controls preload="none" style="width:100%;height:32px;display:block"
        onended="loadTrack(${idx+1})"
        onerror="this.insertAdjacentHTML('afterend','<div style=\'font-size:10px;color:var(--red);margin-top:4px\'>Stream not available</div>')">
        <source src="${mp3}" type="audio/mpeg">
      </audio>
      <div style="display:flex;justify-content:space-between;margin-top:8px">
        <button onclick="loadTrack(${idx}-1)" style="background:none;border:1px solid var(--border);color:var(--accent);cursor:pointer;font-family:var(--block);font-size:12px;letter-spacing:.1em;padding:3px 10px">◀ PREV</button>
        <span style="font-size:10px;color:var(--text-dim);letter-spacing:.08em;align-self:center">${idx+1} / ${tracks.length}</span>
        <button onclick="loadTrack(${idx}+1)" style="background:none;border:1px solid var(--border);color:var(--accent);cursor:pointer;font-family:var(--block);font-size:12px;letter-spacing:.1em;padding:3px 10px">NEXT ▶</button>
      </div>
    </div>`;
  setTimeout(()=>{ const a=player.querySelector('audio'); if(a) a.play().catch(()=>{}); },50);
}

window.toggleDesc=function(idx, url){
  // Toggle popup
  const popup=document.getElementById('tdesc-'+idx);
  if(popup){
    document.querySelectorAll('.track-desc-popup').forEach((p,i)=>{
      if(i!==idx) p.classList.remove('open');
    });
    popup.classList.toggle('open');
  }
  // Play
  window.playTrack(url);
};

window.playTrack=function(url){
  const tracks=window._tracks;
  const m=url.match(/\/track\/([^/]+)/);
  if(!m) return;
  const id=m[1];
  const idx=tracks.findIndex(t=>(t.url||'').includes(id));
  if(idx===-1) return;
  // Toggle description popup
  const btn=document.querySelector(`.track-btn[data-url="${url}"]`);
  if(btn){
    const popup=btn.closest('.track-item-wrap')?.querySelector('.track-desc-popup');
    if(popup){
      // Close all others
      document.querySelectorAll('.track-desc-popup').forEach(p=>{ if(p!==popup) p.classList.remove('open'); });
      popup.classList.toggle('open');
    }
  }
  if(!albumOpen){
    albumOpen=true;
    document.getElementById('playIcon').textContent='■';
    document.getElementById('playLabel').textContent='STOP';
  }
  loadTrack(idx);
};

window.toggleAlbum=function(){
  const player=document.getElementById('albumPlayer');
  const icon=document.getElementById('playIcon');
  const label=document.getElementById('playLabel');
  albumOpen=!albumOpen;
  if(albumOpen){
    loadTrack(0);
    icon.textContent='■';
    label.textContent='STOP';
  } else {
    player.innerHTML='';
    currentTrackIdx=-1;
    icon.textContent='▶';
    label.textContent='PLAY ALBUM';
  }
};

fetch('data.json')
  .then(r=>r.json())
  .then(data=>{
    if(!artistId){location.href='index.html';return;}
    const idx=data.findIndex(a=>a.artist===artistId);
    if(idx===-1){location.href='index.html';return;}
    render(data[idx],idx,data.length,idx>0?data[idx-1]:null,idx<data.length-1?data[idx+1]:null);
  });

function render(a,idx,total,prev,next){
  document.title=`${a.artist} — Audiotool Featured Artist`;
  const tracks=a.tracks||[];
  const albumMatch=(a.album_url||'').match(/\/album\/([^/]+)/);
  const albumId=albumMatch?albumMatch[1]:null;
  const coverSrc=albumId?`https://api.audiotool.com/album/${albumId}/cover/512.jpg`:null;

  document.getElementById('app').innerHTML=`
    <section class="hero">
      <div class="hero-left">
        <div class="hero-num">FEATURED ARTIST ${String(idx+1).padStart(2,'0')} / ${total}</div>
        <h1 class="hero-name">${esc(a.artist)}</h1>
        ${a.real_name&&a.real_name!==a.artist?`<div class="hero-realname">${esc(a.real_name)}</div>`:''}
        ${a.intro?`<p class="hero-intro">${esc(a.intro)}</p>`:''}
      </div>
      <div class="hero-photo">
        ${a.photo?`
          <div class="photo-box"><img src="${esc(a.photo)}" alt="${esc(a.artist)}"></div>
        `:`<div class="photo-box" style="background:var(--surface);display:flex;align-items:center;justify-content:center;"><span style="font-size:10px;color:var(--text-dim);letter-spacing:.1em;font-family:var(--type)">NO PHOTO</span></div>`}
      </div>
    </section>

    <div class="links-bar">
      ${a.at_profile?`<a href="${esc(a.at_profile)}" target="_blank" class="ext-link">Audiotool</a>`:''}
      ${a.soundcloud?`<a href="${esc(a.soundcloud)}" target="_blank" class="ext-link">SoundCloud</a>`:''}
      ${a.social&&a.social.spotify?`<a href="${esc(a.social.spotify)}" target="_blank" class="ext-link">Spotify</a>`:''}
      ${a.social&&a.social.instagram?`<a href="${esc(a.social.instagram)}" target="_blank" class="ext-link">Instagram</a>`:''}
      ${a.social&&a.social.youtube?`<a href="${esc(a.social.youtube)}" target="_blank" class="ext-link">YouTube</a>`:''}
      ${a.social&&a.social.bandcamp?`<a href="${esc(a.social.bandcamp)}" target="_blank" class="ext-link">Bandcamp</a>`:''}
      ${a.social&&a.social.linktree?`<a href="${esc(a.social.linktree)}" target="_blank" class="ext-link">Linktree</a>`:''}
      ${a.social&&a.social.twitter?`<a href="${esc(a.social.twitter)}" target="_blank" class="ext-link">Twitter</a>`:''}
      ${a.album_url?`<a href="${esc(a.album_url)}" target="_blank" class="ext-link">Edition Album</a>`:''}
    </div>

    <div class="main">
      <div class="interview">
        ${(a.about||a.interview&&a.interview.length)?`
          <div class="sec-title">Interview</div>
          ${a.about?`
          <div class="about-block">
            <div class="about-text">${esc(a.about)}</div>
          </div>
          `:''}
          ${a.interview&&a.interview.length?`
          <div class="qa-list">
            ${a.interview.map(qa=>`
              <div class="qa-item">
                <div class="qa-q">${esc(qa.q)}</div>
                <div class="qa-a">${esc(qa.a)}</div>
              </div>
            `).join('')}
          </div>
          `:''}
        `:''}


      </div>

      <div class="sidebar">
        ${coverSrc?`
          <div>
            <div class="sidebar-title">Edition Audiotool</div>
            <a href="${esc(a.album_url||'#')}" target="_blank" class="cover-link" style="margin-top:12px">
              <img src="${coverSrc}" alt="Edition Audiotool: ${esc(a.artist)}" id="albumCover" onerror="this.closest('.cover-link').style.display='none'">              <div class="cover-overlay">Listen ↗</div>
            </a>
          </div>
        `:''}

        ${albumId?`
          <div>
            <button class="play-toggle" id="playToggle" onclick="toggleAlbum()">
              <span id="playIcon">▶</span>
              <span id="playLabel">PLAY ALBUM</span>
            </button>
            <div class="album-player" id="albumPlayer"></div>
          </div>
        `:''}

        ${tracks.length?`
          <div>
            <div class="sidebar-title">Curated Tracks</div>
            <div class="track-list" style="display:flex;flex-direction:column;gap:1px;background:var(--border);margin-top:1px">
              ${tracks.filter(t=>t.name&&t.track_artist).map((t,i)=>`
                <div class="track-item">
                  <button class="track-btn" id="tbtn-${i}" data-url="${esc(t.url)}" onclick="toggleDesc(${i},'${esc(t.url)}')">
                    <img class="track-cover" src="https://api.audiotool.com/track/${tId(t.url)}/cover/256.jpg" onerror="this.style.display='none'" alt="">
                    <span class="tt">${esc(t.track_artist)} · ${esc(t.name)}</span>
                    <span class="tp" id="tp-${i}">▷</span>
                  </button>
                  ${t.desc?`<div class="track-desc" id="tdesc-${i}">${esc(t.desc)}</div>`:''}
                </div>
              `).join('')}
            </div>
          </div>
        `:''}
      </div>
    </div>

    <nav class="nav">
      ${prev?`<a href="artist.html?id=${encodeURIComponent(prev.artist)}" class="nav-a"><span class="nav-dir">← Previous</span><span class="nav-name">${esc(prev.artist)}</span></a>`
            :`<span class="nav-a" style="opacity:.25"><span class="nav-dir">Start of archive</span></span>`}
      ${next?`<a href="artist.html?id=${encodeURIComponent(next.artist)}" class="nav-a"><span class="nav-dir">Next →</span><span class="nav-name">${esc(next.artist)}</span></a>`
            :`<span class="nav-a" style="opacity:.25;text-align:right;align-items:flex-end"><span class="nav-dir">End of archive</span></span>`}
    </nav>
  `;

  window._albumId=albumId;
  // Apply desc_bg if set
  if(a.desc_bg) document.documentElement.style.setProperty('--desc-bg', a.desc_bg);
  else document.documentElement.style.removeProperty('--desc-bg');
  if(a.links_bar_bg) document.documentElement.style.setProperty('--links-bar-bg', a.links_bar_bg);
  else document.documentElement.style.removeProperty('--links-bar-bg');
  window._tracks=tracks.filter(t=>t.name&&t.track_artist);
  // Extract colors from album cover, fall back to artist photo
  // Use manually set colors first, fall back to auto-extraction
  if(a.color1 && a.color2){
    // Convert hex to rgb array for applyColors
    const hexToRgb=h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return[r,g,b];};
    applyColors(hexToRgb(a.color1), hexToRgb(a.color2));
  } else {
    const colorSrc=a.cover_url||coverSrc||a.photo||null;
    if(colorSrc) extractColors(colorSrc, applyColors);
  }
}
</script>
</body>
</html>
