<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featured Artist — Audiotool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #161616;
    --border: #222222;
    --border-bright: #333333;
    --text: #e8e8e8;
    --text-muted: #666;
    --text-dim: #444;
    --accent: #ff4d00;
    --glow: var(--accent);
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.025;
    pointer-events: none;
    z-index: 9999;
  }

  /* ── HEADER ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: var(--sans);
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text);
    text-decoration: none;
  }

  .logo span { color: var(--accent); }

  .back-btn {
    font-size: 11px;
    color: var(--text-muted);
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: color 0.15s;
  }

  .back-btn:hover { color: var(--text); }

  /* ── GLOW BG ── */
  .glow-bg {
    position: fixed;
    top: -30vh;
    left: 50%;
    transform: translateX(-50%);
    width: 80vw;
    height: 60vh;
    background: radial-gradient(ellipse, var(--glow) 0%, transparent 70%);
    opacity: 0.06;
    pointer-events: none;
    z-index: 0;
    transition: background 1s;
    filter: blur(60px);
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    z-index: 1;
    padding: 80px 40px 60px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 40px;
    align-items: end;
  }

  .hero-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .artist-index {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .artist-name {
    font-family: var(--sans);
    font-weight: 800;
    font-size: clamp(40px, 7vw, 96px);
    line-height: 0.9;
    letter-spacing: -0.03em;
    color: var(--text);
    margin-bottom: 16px;
  }

  .artist-realname {
    font-size: 14px;
    color: var(--text-muted);
    letter-spacing: 0.05em;
    margin-bottom: 24px;
  }

  .artist-intro {
    font-size: 13px;
    line-height: 1.8;
    color: var(--text-muted);
    max-width: 680px;
    font-style: italic;
  }

  .hero-meta {
    text-align: right;
    flex-shrink: 0;
  }

  .date-badge {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    border: 1px solid var(--border);
    padding: 8px 16px;
    display: inline-block;
  }

  /* ── LINKS BAR ── */
  .links-bar {
    padding: 16px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    position: relative;
    z-index: 1;
  }

  .ext-link {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: color 0.15s;
  }

  .ext-link:hover { color: var(--text); }

  .ext-link::before {
    content: '↗';
    font-size: 11px;
    color: var(--accent);
  }

  /* ── CONTENT LAYOUT ── */
  .content {
    display: grid;
    grid-template-columns: 1fr 380px;
    position: relative;
    z-index: 1;
  }

  /* ── INTERVIEW ── */
  .interview {
    border-right: 1px solid var(--border);
    padding: 60px 40px;
  }

  .section-title {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 40px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .about-text {
    font-size: 13px;
    line-height: 1.9;
    color: var(--text-muted);
    margin-bottom: 48px;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    padding: 60px 32px;
    display: flex;
    flex-direction: column;
    gap: 40px;
  }

  /* ── TRACKS ── */
  .tracks-section {}

  .track-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    margin-top: 0;
  }

  .track-item {
    background: var(--surface);
    padding: 16px;
    display: flex;
    gap: 12px;
    text-decoration: none;
    color: inherit;
    transition: background 0.15s;
    align-items: flex-start;
  }

  .track-item:hover { background: var(--surface2); }

  .track-num {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    flex-shrink: 0;
    margin-top: 2px;
    width: 20px;
  }

  .track-info { flex: 1; min-width: 0; }

  .track-url {
    font-size: 11px;
    color: var(--text);
    letter-spacing: 0.03em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .track-url strong {
    color: var(--accent);
  }

  .track-desc {
    font-size: 10px;
    color: var(--text-dim);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── ALBUM ── */
  .album-block {
    border: 1px solid var(--border);
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .album-title-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .album-label {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .album-name {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
  }

  .album-link {
    display: inline-block;
    border: 1px solid var(--border-bright);
    color: var(--text);
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 8px 16px;
    transition: all 0.15s;
    align-self: flex-start;
  }

  .album-link:hover {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  /* ── NAV ARROWS ── */
  .nav-arrows {
    display: flex;
    border-top: 1px solid var(--border);
    position: relative;
    z-index: 1;
  }

  .nav-arrow {
    flex: 1;
    padding: 24px 40px;
    text-decoration: none;
    color: var(--text-muted);
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .nav-arrow:hover {
    background: var(--surface);
    color: var(--text);
  }

  .nav-arrow + .nav-arrow {
    border-left: 1px solid var(--border);
    text-align: right;
    align-items: flex-end;
  }

  .nav-arrow-dir {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .nav-arrow-name {
    font-family: var(--sans);
    font-weight: 700;
    font-size: 16px;
  }

  @media (max-width: 960px) {
    .content { grid-template-columns: 1fr; }
    .interview { border-right: none; border-bottom: 1px solid var(--border); }
    .hero { grid-template-columns: 1fr; }
    .hero-meta { text-align: left; }
  }

  @media (max-width: 600px) {
    header, .hero, .links-bar, .interview, .sidebar { padding-left: 20px; padding-right: 20px; }
    .nav-arrow { padding: 20px; }
  }
</style>
</head>
<body>
<div class="glow-bg" id="glowBg"></div>

<header>
  <a href="index.html" class="logo">audiotool <span>//</span> featured artists</a>
  <a href="index.html" class="back-btn">← All artists</a>
</header>

<div id="app">
  <!-- filled by JS -->
</div>

<script>
const PALETTE = [
  '#ff4d00','#ffb800','#00d4ff','#ff006e','#00ff88',
  '#8b5cf6','#f97316','#06b6d4','#84cc16','#ec4899'
];

const params = new URLSearchParams(location.search);
const artistId = params.get('id');

fetch('data.json')
  .then(r => r.json())
  .then(data => {
    if (!artistId) { location.href = 'index.html'; return; }
    const idx = data.findIndex(a => a.artist === artistId);
    if (idx === -1) { location.href = 'index.html'; return; }
    const artist = data[idx];
    const prev = idx > 0 ? data[idx-1] : null;
    const next = idx < data.length-1 ? data[idx+1] : null;
    render(artist, idx, data.length, prev, next);
  });

function formatDate(d) {
  const [y,m,day] = d.split('-');
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  return `${months[parseInt(m)-1]} ${day}, ${y}`;
}

function getTrackId(url) {
  const m = url.match(/\/track\/([^/]+)/);
  return m ? m[1] : null;
}

function escHtml(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function render(a, idx, total, prev, next) {
  const color = PALETTE[idx % PALETTE.length];
  document.title = `${a.artist} — Audiotool Featured Artist`;

  // Set glow color
  document.getElementById('glowBg').style.background =
    `radial-gradient(ellipse, ${color} 0%, transparent 70%)`;
  document.documentElement.style.setProperty('--accent', color);

  const hasSoundcloud = a.soundcloud;
  const hasProfile = a.at_profile;
  const hasAlbum = a.album_url;
  const tracks = a.tracks || [];

  document.getElementById('app').innerHTML = `
    <section class="hero">
      <div class="hero-left">
        <p class="hero-label">Featured Artist ${String(idx+1).padStart(3,'0')} / ${total}</p>
        <div class="artist-name">${escHtml(a.artist)}</div>
        ${a.real_name && a.real_name !== a.artist
          ? `<div class="artist-realname">${escHtml(a.real_name)}</div>`
          : ''}
        ${a.intro ? `<p class="artist-intro">"${escHtml(a.intro)}"</p>` : ''}
      </div>
      <div class="hero-meta">
        <div class="date-badge">${formatDate(a.date)}</div>
      </div>
    </section>

    ${(hasProfile || hasSoundcloud || hasAlbum) ? `
    <div class="links-bar">
      ${hasProfile ? `<a href="${escHtml(hasProfile)}" target="_blank" class="ext-link">Audiotool Profile</a>` : ''}
      ${hasSoundcloud ? `<a href="${escHtml(hasSoundcloud)}" target="_blank" class="ext-link">SoundCloud</a>` : ''}
      ${hasAlbum ? `<a href="${escHtml(hasAlbum)}" target="_blank" class="ext-link">Edition Album</a>` : ''}
      <a href="${escHtml(a.board_url)}" target="_blank" class="ext-link">Original Post</a>
    </div>
    ` : `
    <div class="links-bar">
      <a href="${escHtml(a.board_url)}" target="_blank" class="ext-link">Original Post</a>
    </div>
    `}

    <div class="content">
      <div class="interview">
        ${a.about ? `
          <p class="section-title">About</p>
          <div class="about-text">${escHtml(a.about)}</div>
        ` : ''}
        <p class="section-title">Interview</p>
        <div class="about-text" style="color:var(--text-dim);font-size:12px">
          Read the full interview on the
          <a href="${escHtml(a.board_url)}" target="_blank"
             style="color:var(--text-muted);text-decoration:underline;text-underline-offset:3px">
            original board post ↗
          </a>
        </div>
      </div>

      <div class="sidebar">
        ${tracks.length ? `
          <div class="tracks-section">
            <p class="section-title">Curated Tracks</p>
            <div class="track-list">
              ${tracks.map((t,i) => {
                const tid = getTrackId(t.url);
                const name = tid ? tid.replace(/_/g,' ').replace(/-[a-z0-9]{4,}$/,'') : t.url;
                return `
                  <a href="${escHtml(t.url)}" target="_blank" class="track-item">
                    <span class="track-num">${String(i+1).padStart(2,'0')}</span>
                    <div class="track-info">
                      <div class="track-url">${escHtml(name)}</div>
                      ${t.desc ? `<div class="track-desc">${escHtml(t.desc)}</div>` : ''}
                    </div>
                  </a>
                `;
              }).join('')}
            </div>
          </div>
        ` : ''}

        ${hasAlbum ? `
          <div class="album-block">
            <div class="album-title-row">
              <span class="album-label">Edition Audiotool</span>
              <span class="album-name">${escHtml(a.artist)}</span>
            </div>
            <a href="${escHtml(hasAlbum)}" target="_blank" class="album-link">
              Listen on Audiotool ↗
            </a>
          </div>
        ` : ''}
      </div>
    </div>

    <nav class="nav-arrows">
      ${prev ? `
        <a href="artist.html?id=${encodeURIComponent(prev.artist)}" class="nav-arrow">
          <span class="nav-arrow-dir">← Previous</span>
          <span class="nav-arrow-name">${escHtml(prev.artist)}</span>
        </a>
      ` : '<span class="nav-arrow" style="opacity:0.2"><span class="nav-arrow-dir">Start of archive</span></span>'}
      ${next ? `
        <a href="artist.html?id=${encodeURIComponent(next.artist)}" class="nav-arrow">
          <span class="nav-arrow-dir">Next →</span>
          <span class="nav-arrow-name">${escHtml(next.artist)}</span>
        </a>
      ` : '<span class="nav-arrow" style="opacity:0.2;text-align:right;align-items:flex-end"><span class="nav-arrow-dir">End of archive</span></span>'}
    </nav>
  `;
}
</script>
</body>
</html>
