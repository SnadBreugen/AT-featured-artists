<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Featured Artist — Audiotool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --border: #242424;
    --text: #f0ece4;
    --text-muted: #888;
    --text-dim: #444;
    --accent: #c8b89a;
    --serif: 'DM Serif Display', Georgia, serif;
    --mono: 'DM Mono', monospace;
    --max: 1100px;
    --pad: clamp(20px, 4vw, 60px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── COLOR BANDS BG ── */
  .color-bands {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    transition: opacity 1.4s ease;
  }
  .color-bands.visible { opacity: 1; }
  .band-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 50vh;
    transition: background 1.2s ease;
  }
  .band-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50vh;
    transition: background 1.2s ease;
  }
  .band-fade {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 20%, var(--bg) 75%);
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
    background: rgba(13,13,13,0.93);
    backdrop-filter: blur(16px);
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 var(--pad);
  }

  .logo {
    font-family: var(--mono);
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .logo:hover { color: var(--text); }
  .logo em { color: var(--accent); font-style: normal; }

  .back-btn {
    font-size: 11px;
    color: var(--text-dim);
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--text); }

  /* ── HERO ── */
  .hero {
    position: relative;
    z-index: 1;
    max-width: var(--max);
    margin: 0 auto;
    padding: clamp(40px, 6vw, 80px) var(--pad) 0;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 48px;
    align-items: start;
  }

  .hero-index {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .hero-name {
    font-family: var(--serif);
    font-size: clamp(52px, 9vw, 108px);
    line-height: 0.9;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 12px;
  }

  .hero-realname {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    margin-bottom: 28px;
  }

  .hero-intro {
    font-family: var(--serif);
    font-style: italic;
    font-size: 15px;
    line-height: 1.8;
    color: var(--text-muted);
    max-width: 540px;
    border-left: 2px solid var(--border);
    padding-left: 20px;
  }

  /* ── PHOTO ── */
  .photo-frame {
    width: clamp(160px, 20vw, 260px);
    aspect-ratio: 1;
    overflow: hidden;
    flex-shrink: 0;
  }

  .photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top center;
    display: block;
    filter: grayscale(10%);
    transition: filter 0.4s;
  }
  .photo-frame img:hover { filter: grayscale(0%); }

  .photo-date {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    margin-top: 10px;
    text-align: right;
  }

  /* ── LINKS BAR ── */
  .links-bar {
    position: relative;
    z-index: 1;
    max-width: var(--max);
    margin: 32px auto 0;
    padding: 16px var(--pad);
    display: flex;
    gap: 24px;
    flex-wrap: wrap;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }

  .ext-link {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.15s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .ext-link::before { content: '↗'; color: var(--accent); }
  .ext-link:hover { color: var(--text); }

  /* ── MAIN CONTENT ── */
  .main {
    position: relative;
    z-index: 1;
    max-width: var(--max);
    margin: 0 auto;
    padding: 0 var(--pad);
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 0;
  }

  /* ── INTERVIEW ── */
  .interview {
    padding: 56px 48px 80px 0;
    border-right: 1px solid var(--border);
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .about-block { margin-bottom: 52px; }

  .about-text {
    font-size: 14px;
    line-height: 1.9;
    color: #9a9690;
    font-weight: 300;
  }

  .qa-list {
    display: flex;
    flex-direction: column;
    gap: 44px;
  }

  .qa-q {
    font-family: var(--serif);
    font-style: italic;
    font-size: 17px;
    line-height: 1.4;
    color: var(--text);
    margin-bottom: 14px;
  }

  .qa-a {
    font-size: 13px;
    line-height: 1.95;
    color: #8a8680;
    font-weight: 300;
  }

  .board-link {
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-dim);
  }
  .board-link a {
    color: var(--text-dim);
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: color 0.15s;
  }
  .board-link a:hover { color: var(--text-muted); }

  /* ── SIDEBAR ── */
  .sidebar {
    padding: 56px 0 80px 36px;
    display: flex;
    flex-direction: column;
    gap: 44px;
  }

  /* ── ALBUM COVER ── */
  .album-cover-link {
    display: block;
    position: relative;
    overflow: hidden;
  }
  .album-cover-link::after {
    content: 'Open on Audiotool ↗';
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .album-cover-link:hover::after { opacity: 1; }

  .album-cover {
    width: 100%;
    display: block;
    border: 1px solid var(--border);
  }

  /* ── TRACKS ── */
  .track-list {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
  }

  .track-item {
    background: var(--surface);
    padding: 11px 14px;
    display: grid;
    grid-template-columns: 22px 1fr 20px;
    gap: 8px;
    align-items: center;
    cursor: pointer;
    transition: background 0.15s;
    border: none;
    width: 100%;
    text-align: left;
    color: inherit;
    font-family: var(--mono);
  }
  .track-item:hover { background: #1a1a1a; }
  .track-item.active { background: #1c1c1c; }
  .track-item.active .track-num { color: var(--accent); }
  .track-item.active .track-name { color: var(--text); }
  .track-item.active .track-play { color: var(--accent); }

  .track-num {
    font-size: 10px;
    color: var(--text-dim);
    font-variant-numeric: tabular-nums;
  }

  .track-name {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.02em;
  }

  .track-play {
    font-size: 9px;
    color: var(--text-dim);
    text-align: right;
  }

  /* ── PLAYER ── */
  .player-wrap {
    overflow: hidden;
    transition: height 0.3s ease;
    height: 0;
    border: 1px solid var(--border);
    border-top: none;
  }
  .player-wrap.open { height: 152px; }
  .player-wrap iframe {
    width: 100%;
    height: 152px;
    border: none;
    display: block;
  }

  /* ── NAV ── */
  .nav-arrows {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .nav-arrow {
    padding: 28px var(--pad);
    text-decoration: none;
    color: var(--text-dim);
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .nav-arrow:hover { background: var(--surface); color: var(--text); }
  .nav-arrow + .nav-arrow { border-left: 1px solid var(--border); text-align: right; align-items: flex-end; }

  .nav-dir {
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .nav-name {
    font-family: var(--serif);
    font-size: 20px;
    font-style: italic;
    color: var(--text);
  }

  @media (max-width: 900px) {
    .hero { grid-template-columns: 1fr; gap: 28px; }
    .photo-frame { width: 160px; }
    .photo-date { text-align: left; }
    .main { grid-template-columns: 1fr; }
    .interview { border-right: none; border-bottom: 1px solid var(--border); padding-right: 0; }
    .sidebar { padding-left: 0; }
  }
</style>
</head>
<body>

<div class="color-bands" id="colorBands">
  <div class="band-top" id="bandTop"></div>
  <div class="band-bottom" id="bandBottom"></div>
  <div class="band-fade"></div>
</div>

<header>
  <a href="index.html" class="logo">audiotool <em>//</em> featured artists</a>
  <a href="index.html" class="back-btn">← All artists</a>
</header>

<div id="app"></div>

<script>
const params = new URLSearchParams(location.search);
const artistId = params.get('id');
let currentTrackUrl = null;

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[parseInt(m)-1]} ${parseInt(day)}, ${y}`;
}

function trackSlug(url) {
  const m = url.match(/\/track\/([^/]+)/);
  if (!m) return url;
  return m[1].replace(/_/g,' ').replace(/-[a-z0-9]{6,}$/, '').replace(/-/g,' ');
}

function extractColors(src, cb) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    try {
      const c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      const ctx = c.getContext('2d');
      ctx.drawImage(img, 0, 0);
      function avg(data) {
        let r=0,g=0,b=0,n=0;
        for (let i=0;i<data.length;i+=4){r+=data[i];g+=data[i+1];b+=data[i+2];n++;}
        return `rgb(${Math.round(r/n)},${Math.round(g/n)},${Math.round(b/n)})`;
      }
      cb(
        avg(ctx.getImageData(4, 4, 60, 60).data),
        avg(ctx.getImageData(4, img.height-64, 60, 60).data)
      );
    } catch(e) { cb(null,null); }
  };
  img.onerror = () => cb(null,null);
  img.src = src;
}

function applyColors(c1, c2) {
  if (!c1) return;
  document.getElementById('bandTop').style.background = `linear-gradient(to bottom, ${c1} 0%, transparent 100%)`;
  document.getElementById('bandBottom').style.background = `linear-gradient(to top, ${c2||c1} 0%, transparent 100%)`;
  document.getElementById('colorBands').classList.add('visible');
}

window.playTrack = function(url) {
  const m = url.match(/\/track\/([^/]+)/);
  if (!m) return;
  const wrap = document.getElementById('playerWrap');
  const items = document.querySelectorAll('.track-item');

  if (currentTrackUrl === url) {
    wrap.classList.remove('open');
    wrap.innerHTML = '';
    currentTrackUrl = null;
    items.forEach(el => { el.classList.remove('active'); el.querySelector('.track-play').textContent = '▷'; });
    return;
  }

  currentTrackUrl = url;
  wrap.innerHTML = `<iframe src="https://www.audiotool.com/track/${m[1]}/embed/" allow="autoplay"></iframe>`;
  wrap.classList.add('open');
  items.forEach(el => {
    const active = el.dataset.url === url;
    el.classList.toggle('active', active);
    el.querySelector('.track-play').textContent = active ? '▶' : '▷';
  });
};

fetch('data.json')
  .then(r => r.json())
  .then(data => {
    if (!artistId) { location.href='index.html'; return; }
    const idx = data.findIndex(a => a.artist === artistId);
    if (idx === -1) { location.href='index.html'; return; }
    render(data[idx], idx, data.length, idx>0?data[idx-1]:null, idx<data.length-1?data[idx+1]:null);
  });

function render(a, idx, total, prev, next) {
  document.title = `${a.artist} — Audiotool Featured Artist`;
  const tracks = a.tracks || [];
  const albumMatch = (a.album_url||'').match(/\/album\/([^/]+)/);
  const albumId = albumMatch ? albumMatch[1] : null;

  document.getElementById('app').innerHTML = `
    <section class="hero">
      <div class="hero-left">
        <div class="hero-index">Featured Artist ${String(idx+1).padStart(2,'0')} / ${total}</div>
        <h1 class="hero-name">${esc(a.artist)}</h1>
        ${a.real_name && a.real_name !== a.artist ? `<div class="hero-realname">${esc(a.real_name)}</div>` : ''}
        ${a.intro ? `<p class="hero-intro">${esc(a.intro)}</p>` : ''}
      </div>
      <div>
        ${a.photo ? `
          <div class="photo-frame">
            <img src="${esc(a.photo)}" alt="${esc(a.artist)}" id="artistPhoto">
          </div>
          <div class="photo-date">${formatDate(a.date)}</div>
        ` : `<div class="photo-frame" style="background:var(--surface);display:flex;align-items:center;justify-content:center;"><span style="font-size:10px;color:var(--text-dim);letter-spacing:.1em">NO PHOTO</span></div>`}
      </div>
    </section>

    <div class="links-bar">
      ${a.at_profile ? `<a href="${esc(a.at_profile)}" target="_blank" class="ext-link">Audiotool</a>` : ''}
      ${a.soundcloud ? `<a href="${esc(a.soundcloud)}" target="_blank" class="ext-link">SoundCloud</a>` : ''}
      ${a.album_url ? `<a href="${esc(a.album_url)}" target="_blank" class="ext-link">Edition Album</a>` : ''}
      ${a.board_url ? `<a href="${esc(a.board_url)}" target="_blank" class="ext-link">Original Post</a>` : ''}
    </div>

    <div class="main">
      <div class="interview">
        ${a.about ? `<div class="about-block"><div class="section-label">About</div><div class="about-text">${esc(a.about)}</div></div>` : ''}
        ${a.interview && a.interview.length ? `
          <div class="section-label">Interview</div>
          <div class="qa-list">
            ${a.interview.map(qa => `
              <div class="qa-item">
                <div class="qa-q">${esc(qa.q)}</div>
                <div class="qa-a">${esc(qa.a)}</div>
              </div>
            `).join('')}
          </div>
        ` : ''}
        <div class="board-link"><a href="${esc(a.board_url)}" target="_blank">Original board post ↗</a></div>
      </div>

      <div class="sidebar">
        ${albumId ? `
          <div>
            <div class="section-label">Edition Audiotool</div>
            <a href="${esc(a.album_url)}" target="_blank" class="album-cover-link">
              <img
                src="https://at-cdn-s03.audiotool.com/albums/${albumId}/cover512x512.jpg"
                alt="Edition Audiotool: ${esc(a.artist)}"
                class="album-cover"
                id="albumCover"
                onerror="this.closest('.album-cover-link').style.display='none'"
              >
            </a>
          </div>
        ` : ''}

        ${tracks.length ? `
          <div>
            <div class="section-label">Curated Tracks</div>
            <div class="track-list">
              ${tracks.map((t,i) => `
                <button class="track-item" data-url="${esc(t.url)}" onclick="playTrack('${esc(t.url)}')">
                  <span class="track-num">${String(i+1).padStart(2,'0')}</span>
                  <span class="track-name">${esc(trackSlug(t.url))}</span>
                  <span class="track-play">▷</span>
                </button>
              `).join('')}
            </div>
            <div class="player-wrap" id="playerWrap"></div>
          </div>
        ` : ''}
      </div>
    </div>

    <nav class="nav-arrows">
      ${prev ? `<a href="artist.html?id=${encodeURIComponent(prev.artist)}" class="nav-arrow"><span class="nav-dir">← Previous</span><span class="nav-name">${esc(prev.artist)}</span></a>`
             : `<span class="nav-arrow" style="opacity:.25"><span class="nav-dir">Start of archive</span></span>`}
      ${next ? `<a href="artist.html?id=${encodeURIComponent(next.artist)}" class="nav-arrow"><span class="nav-dir">Next →</span><span class="nav-name">${esc(next.artist)}</span></a>`
             : `<span class="nav-arrow" style="opacity:.25;text-align:right;align-items:flex-end"><span class="nav-dir">End of archive</span></span>`}
    </nav>
  `;

  // Color extraction
  const colorSrc = albumId
    ? `https://at-cdn-s03.audiotool.com/albums/${albumId}/cover512x512.jpg`
    : a.photo || null;
  if (colorSrc) extractColors(colorSrc, applyColors);
}
</script>
</body>
</html>
